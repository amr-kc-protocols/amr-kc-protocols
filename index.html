<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AMR KC Protocols">
<meta name="theme-color" content="#0a0e1a">
<meta name="description" content="AMR Kansas City Medical Protocols 2026 — Dr. Ameet Deshmukh MD">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>AMR KC Protocols 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');
:root{
  --navy:#0f1e3d;--navy2:#162447;--teal:#0d9488;--teal2:#14b8a6;
  --white:#f0f4f8;--gray:#8899aa;--dim:#1e2d45;
  --emt:#16a34a;--emt-bg:#052e16;--emt-light:#e8f5e9;
  --aemt:#2563eb;--aemt-bg:#0c1a3a;
  --pm:#7c3aed;--pm-bg:#1e0a3a;
  --warn:#f59e0b;--danger:#ef4444;--danger-bg:#2a0a0a;
  --surface:#111827;--surface2:#1a2540;--border:#1e3a5f;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:var(--sans);background:var(--surface);color:var(--white);position:relative}

/* LOADING */
#loading{position:fixed;inset:0;background:#060d1f;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s}
.load-logo{font-family:var(--mono);font-size:48px;font-weight:600;color:var(--teal);
  letter-spacing:-0.02em;margin-bottom:4px}
.load-agency{font-size:11px;color:var(--gray);letter-spacing:0.16em;text-transform:uppercase}
.load-bar{width:180px;height:2px;background:var(--dim);border-radius:2px;margin-top:28px;overflow:hidden}
.load-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));
  animation:fill 1.4s cubic-bezier(0.4,0,0.2,1) forwards}
@keyframes fill{from{width:0}to{width:100%}}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,#060d1f 0%,var(--navy) 100%);
  border-bottom:1px solid var(--teal)}
.hdr-top{display:flex;align-items:center;gap:10px;padding:10px 14px 6px}
.hdr-badge{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.hdr-icon{width:30px;height:30px;background:var(--teal);border-radius:5px;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  color:#000;flex-shrink:0;font-family:var(--mono)}
.hdr-name{line-height:1.15;min-width:0}
.hdr-name .l1{font-size:12px;font-weight:700;letter-spacing:0.08em;color:var(--teal2);text-transform:uppercase}
.hdr-name .l2{font-size:9px;color:var(--gray);letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-status{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--gray);flex-shrink:0}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--emt);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* SEARCH */
.srch-wrap{padding:5px 14px 8px;position:relative}
#srch{width:100%;height:38px;background:var(--dim);border:1px solid var(--border);
  border-radius:7px;color:var(--white);font-family:var(--mono);font-size:13px;
  padding:0 38px 0 34px;outline:none;transition:border-color 0.15s;-webkit-appearance:none}
#srch:focus{border-color:var(--teal)}
#srch::placeholder{color:var(--gray)}
.srch-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);
  color:var(--gray);font-size:15px;pointer-events:none;user-select:none}
#srch-clr{position:absolute;right:26px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--gray);font-size:15px;cursor:pointer;
  padding:4px;display:none;line-height:1}

/* SCOPE PILLS */
.scope-bar{display:flex;gap:5px;padding:0 14px 9px;overflow-x:auto;scrollbar-width:none}
.scope-bar::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;
  letter-spacing:0.06em;border:1px solid;cursor:pointer;transition:all 0.12s;font-family:var(--mono)}
.pill[data-s="all"]{border-color:var(--gray);color:var(--gray)}
.pill[data-s="emt"]{border-color:var(--emt);color:var(--emt)}
.pill[data-s="aemt"]{border-color:var(--aemt);color:var(--aemt)}
.pill[data-s="pm"]{border-color:var(--pm);color:var(--pm)}
.pill.on[data-s="all"]{background:var(--gray);color:#000}
.pill.on[data-s="emt"]{background:var(--emt);color:#000}
.pill.on[data-s="aemt"]{background:var(--aemt);color:#fff}
.pill.on[data-s="pm"]{background:var(--pm);color:#fff}

/* MAIN */
#main{padding-top:120px;padding-bottom:72px;min-height:100vh}

/* SECTION GROUP */
.sg{padding:16px 14px 5px;font-family:var(--mono);font-size:9px;font-weight:600;
  letter-spacing:0.14em;color:var(--teal);text-transform:uppercase;
  border-bottom:1px solid var(--border)}
.sg-sub{padding:7px 14px 3px;font-size:10px;color:var(--gray);letter-spacing:0.05em}

/* CARDS */
.card{margin:3px 10px;border-radius:9px;overflow:hidden;cursor:pointer;
  border:1px solid var(--border);transition:opacity 0.1s}
.card:active{opacity:0.75}
.card-inner{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface2)}
.card-num{font-family:var(--mono);font-size:10px;color:var(--gray);flex-shrink:0;min-width:52px}
.card-title{flex:1;font-size:13px;font-weight:500;line-height:1.3}
.sbadge{flex-shrink:0;padding:2px 7px;border-radius:3px;font-family:var(--mono);
  font-size:9px;font-weight:600;letter-spacing:0.05em}
.sbadge.all{background:var(--emt-bg);color:var(--emt);border:1px solid var(--emt)}
.sbadge.aemt{background:var(--aemt-bg);color:var(--aemt);border:1px solid var(--aemt)}
.sbadge.pm{background:var(--pm-bg);color:var(--pm);border:1px solid var(--pm)}
.card-arr{color:var(--gray);font-size:12px;flex-shrink:0}
.fav-btn{background:none;border:none;font-size:16px;cursor:pointer;flex-shrink:0;padding:2px;line-height:1}

/* NO RESULTS */
.no-res{text-align:center;padding:60px 20px;color:var(--gray);font-size:14px}
.res-label{padding:10px 14px 3px;font-family:var(--mono);font-size:9px;color:var(--gray);letter-spacing:0.08em}

/* DETAIL VIEW */
#dv{display:none;position:fixed;inset:0;z-index:200;background:var(--surface);
  overflow-y:auto;-webkit-overflow-scrolling:touch}
.dv-hdr{position:sticky;top:0;z-index:10;background:var(--navy);
  border-bottom:2px solid var(--teal);padding:11px 14px;
  display:flex;align-items:flex-start;gap:10px}
.back{background:var(--dim);border:1px solid var(--border);color:var(--teal2);
  font-size:12px;font-weight:600;padding:6px 11px;border-radius:5px;
  cursor:pointer;flex-shrink:0;font-family:var(--sans)}
.dv-meta{flex:1;min-width:0}
.dv-num{font-family:var(--mono);font-size:9px;color:var(--gray)}
.dv-title{font-size:15px;font-weight:700;line-height:1.2;margin-top:2px}
.dv-scope{margin-top:4px;display:inline-block}
.dv-fav{background:none;border:none;font-size:22px;cursor:pointer;
  padding:2px;line-height:1;flex-shrink:0;align-self:center}
.dv-body{padding:14px}

/* CONTENT */
.cs{margin-bottom:20px}
.cl{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.1em;
  color:var(--teal);text-transform:uppercase;padding-bottom:5px;
  border-bottom:1px solid var(--border);margin-bottom:8px}
.ct{font-size:13px;line-height:1.6;color:#cbd5e1}

/* VITAL STRIP */
.vs{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;
  scrollbar-width:none;margin-bottom:14px}
.vs::-webkit-scrollbar{display:none}
.vc{flex-shrink:0;background:var(--dim);border:1px solid var(--border);
  border-radius:7px;padding:7px 11px;text-align:center;min-width:72px}
.vl{font-size:9px;color:var(--gray);font-family:var(--mono);margin-bottom:2px}
.vv{font-size:13px;font-weight:700;color:var(--teal2);font-family:var(--mono)}

/* SCOPE TABLE */
.sot{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px}
.sot th{padding:7px 8px;text-align:center;font-family:var(--mono);font-size:9px;
  font-weight:600;letter-spacing:0.06em;border-bottom:1px solid var(--border)}
.sot th.ec{color:var(--emt)}.sot th.ac{color:var(--aemt)}.sot th.pc{color:var(--pm)}
.sot th.lc{text-align:left;color:var(--gray)}
.sot td{padding:8px 7px;border-bottom:1px solid #152030;vertical-align:top;line-height:1.5}
.sot td.lc{font-size:10px;color:var(--gray);font-family:var(--mono);width:24px}
.sot td.ec{background:#050d05}.sot td.ac{background:#050a14}.sot td.pc{background:#0a0514}

/* STEPS */
.step{display:flex;gap:8px;margin-bottom:8px}
.sn{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--teal);
  color:#000;font-weight:700;font-size:10px;display:flex;align-items:center;
  justify-content:center;margin-top:1px;font-family:var(--mono)}
.st{font-size:13px;line-height:1.5;color:#cbd5e1}

/* CALLOUTS */
.co{border-left:3px solid;padding:9px 11px;border-radius:0 7px 7px 0;margin-bottom:8px;font-size:12px;line-height:1.5}
.co.w{border-color:var(--warn);background:#1a1200;color:#fde68a}
.co.d{border-color:var(--danger);background:var(--danger-bg);color:#fca5a5}
.co.i{border-color:var(--teal);background:#001a18;color:#99f6e4}

/* DOSE TABLE */
.dt{width:100%;font-size:12px}
.dt td{padding:6px 7px;border-bottom:1px solid #1a2a3a;vertical-align:top}
.dt td:first-child{color:var(--gray);font-family:var(--mono);width:38%}
.dt td:last-child{color:var(--white)}

/* MONITORING SECTION */
.mon-item{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #152030;font-size:13px;color:#cbd5e1}
.mon-dot{flex-shrink:0;width:5px;height:5px;border-radius:50%;background:var(--teal2);margin-top:6px}

/* DIVERSION */
.div-box{background:#1a0a0a;border:1px solid var(--danger);border-radius:7px;
  padding:10px 12px;font-size:12px;color:#fca5a5;line-height:1.5;margin-bottom:10px}
.div-label{font-family:var(--mono);font-size:9px;color:var(--danger);
  letter-spacing:0.1em;font-weight:600;margin-bottom:4px}

/* DRUG GRID */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dc{background:var(--dim);border:1px solid var(--border);border-radius:7px;
  padding:9px 11px;cursor:pointer;transition:border-color 0.12s}
.dc:active{border-color:var(--teal)}
.dn{font-size:12px;font-weight:600;color:var(--teal2);margin-bottom:2px}
.dd{font-size:10px;color:var(--gray);font-family:var(--mono)}

/* REFERENCE */
.ref-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.ref-label{font-size:12px;color:var(--gray)}
.ref-val{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--teal2)}
.alarm-row{display:flex;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.alarm-code{flex-shrink:0;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--danger);min-width:88px}
.alarm-det{flex:1}
.alarm-cause{font-size:11px;color:var(--gray);margin-bottom:3px}
.alarm-act{font-size:12px;color:var(--white)}
.ped-item{background:var(--dim);padding:9px 11px;border-radius:6px;margin-bottom:3px}
.ped-drug{font-size:12px;font-weight:600;color:var(--teal2);margin-bottom:2px}
.ped-dose{font-family:var(--mono);font-size:11px;color:var(--white)}

/* RECENTLY VIEWED */
.rv-wrap{padding:12px 14px}
.rv-label{font-family:var(--mono);font-size:9px;color:var(--gray);letter-spacing:0.1em;margin-bottom:8px}
.rv-chips{display:flex;gap:6px;flex-wrap:wrap}
.rv-chip{background:var(--dim);border:1px solid var(--border);border-radius:20px;
  padding:4px 11px;font-size:11px;cursor:pointer;color:var(--white);
  font-family:var(--mono);transition:border-color 0.12s}
.rv-chip:active{border-color:var(--teal)}

/* SEARCH HIGHLIGHT */
.hl{color:var(--teal2);background:rgba(13,148,136,0.15);border-radius:2px;padding:0 2px}

/* DOSE CALCULATOR */
.calc-wrap{background:var(--dim);border:1px solid var(--teal);border-radius:10px;padding:14px;margin-bottom:16px}
.calc-title{font-family:var(--mono);font-size:10px;color:var(--teal);letter-spacing:0.08em;margin-bottom:10px}
.calc-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.calc-label{font-size:12px;color:var(--gray);min-width:60px}
.calc-input{background:var(--surface);border:1px solid var(--border);border-radius:5px;
  color:var(--white);font-family:var(--mono);font-size:15px;padding:7px 10px;
  width:80px;outline:none;text-align:center;-webkit-appearance:none}
.calc-unit{font-family:var(--mono);font-size:11px;color:var(--gray)}
.calc-result{background:var(--navy);border-radius:7px;padding:10px 12px;margin-top:8px}
.calc-result-label{font-size:10px;color:var(--gray);font-family:var(--mono);margin-bottom:3px}
.calc-result-val{font-size:16px;font-weight:700;color:var(--teal2);font-family:var(--mono)}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--navy);border-top:1px solid var(--border);
  display:flex;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:7px 4px 5px;cursor:pointer;border:none;background:none;
  color:var(--gray);font-size:9px;font-family:var(--sans);gap:2px;transition:color 0.12s}
.nb.on{color:var(--teal2)}
.nb-icon{font-size:18px;line-height:1}

/* INSTALL BANNER */
#install-banner{position:fixed;bottom:72px;left:10px;right:10px;z-index:150;
  background:var(--navy2);border:1px solid var(--teal);border-radius:10px;
  padding:12px 14px;display:none;align-items:center;gap:10px}
.ib-text{flex:1;font-size:12px;line-height:1.4;color:var(--white)}
.ib-btn{background:var(--teal);color:#000;border:none;border-radius:5px;
  padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
.ib-close{background:none;border:none;color:var(--gray);font-size:16px;cursor:pointer;flex-shrink:0}
</style>
</head>

// ── STATE ────────────────────────────────────────────────────────────────────
let TAB = 'ift';
let SCOPE = 'all';
let QUERY = '';
let CURRENT = null;
let FAVS = JSON.parse(localStorage.getItem('amrkc_favs') || '[]');
let RECENT = JSON.parse(localStorage.getItem('amrkc_recent') || '[]');
let WEIGHT = '';
let deferredPrompt = null;

// ── UTILS ────────────────────────────────────────────────────────────────────
const scopeMap = {all:0,emt:0,aemt:1,pm:2};
const itemScopeMap = {all:0,aemt:1,pm:2};

function scopeLabel(s){return{all:'ALL LEVELS',aemt:'AEMT+',pm:'PM ONLY'}[s]||s.toUpperCase()}
function scopeBadge(s){return`<span class="sbadge ${s}">${scopeLabel(s)}</span>`}

function matchScope(item){
  if(SCOPE==='all')return true;
  return itemScopeMap[item.scope]<=scopeMap[SCOPE];
}

function matchSearch(item){
  if(!QUERY)return true;
  const q=QUERY.toLowerCase();
  const text=(item.title||item.name||'')+' '+(item.num||'')+' '+(item.tags||[]).join(' ')+' '+(item.overview||'');
  return text.toLowerCase().includes(q);
}

function hl(text){
  if(!QUERY)return text;
  return text.replace(new RegExp('('+QUERY.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="hl">$1</span>');
}

function isFav(key){return FAVS.includes(key)}

function toggleFav(key){
  if(isFav(key)){FAVS=FAVS.filter(k=>k!==key)}else{FAVS=[key,...FAVS]}
  localStorage.setItem('amrkc_favs',JSON.stringify(FAVS));
}

function addRecent(key){
  RECENT=[key,...RECENT.filter(k=>k!==key)].slice(0,8);
  localStorage.setItem('amrkc_recent',JSON.stringify(RECENT));
}

function itemByKey(key){
  const [type,idx]=key.split(':');
  const arr={ift:D.ift,viii:D.viii,formulary:D.formulary,procedures:D.procedures}[type];
  return arr?arr[parseInt(idx)]:null;
}

function itemKey(type,idx){return`${type}:${idx}`}

function updateHdrPad(){
  const h=document.getElementById('hdr').offsetHeight;
  document.getElementById('main').style.paddingTop=(h+6)+'px';
}

// ── RENDER LIST ──────────────────────────────────────────────────────────────
function renderList(){
  const container=document.getElementById('lv');
  let html='';

  if(TAB==='reference'){renderReference();return}

  const sources={ift:D.ift,viii:D.viii,formulary:D.formulary,procedures:D.procedures};
  const items=sources[TAB]||[];
  const filtered=items.map((item,idx)=>({item,idx})).filter(({item})=>matchScope(item)&&matchSearch(item));

  if(QUERY){
    html+=`<div class="res-label">${filtered.length} RESULT${filtered.length!==1?'S':''} IN ${TAB.toUpperCase()}</div>`;
  }

  // Show favorites and recent on home tab with no search
  if(TAB==='ift'&&!QUERY&&RECENT.length){
    html+=`<div class="rv-wrap"><div class="rv-label">RECENTLY VIEWED</div><div class="rv-chips">`;
    RECENT.forEach(key=>{
      const item=itemByKey(key);
      if(item)html+=`<div class="rv-chip" onclick="openByKey('${key}')">${item.num||''} ${item.title||item.name||''}</div>`;
    });
    html+=`</div></div>`;
  }

  if(filtered.length===0){
    html+='<div class="no-res">No protocols found for this filter.</div>';
    container.innerHTML=html;return;
  }

  let lastSection='',lastGroup='';
  filtered.forEach(({item,idx})=>{
    const sec=item.section||'';
    const grp=item.group||'';
    if(sec!==lastSection){
      html+=`<div class="sg">${sec||TAB.toUpperCase()}</div>`;
      lastSection=sec;lastGroup='';
    }
    if(grp&&grp!==lastGroup){
      html+=`<div class="sg-sub">${grp}</div>`;
      lastGroup=grp;
    }
    const key=itemKey(TAB,idx);
    const fav=isFav(key);
    const title=hl(item.title||item.name||'');
    html+=`<div class="card" onclick="openDetail('${TAB}',${idx})">
      <div class="card-inner">
        <div class="card-num">${item.num}</div>
        <div class="card-title">${title}</div>
        ${scopeBadge(item.scope)}
        <button class="fav-btn" onclick="event.stopPropagation();toggleFavCard('${key}',this)">${fav?'★':'☆'}</button>
        <div class="card-arr">›</div>
      </div>
    </div>`;
  });

  container.innerHTML=html;
}

function toggleFavCard(key,btn){
  toggleFav(key);
  btn.textContent=isFav(key)?'★':'☆';
  if(CURRENT&&CURRENT.key===key){
    document.getElementById('dv-fav').textContent=isFav(key)?'★':'☆';
  }
}

    ['HIGH f','Total breath rate exceeds alarm threshold. Patient triggering excess breaths.','Assess pain/anxiety. Check for auto-triggering. Address cause.'],
  ];
  alarms.forEach(a=>html+=`<div class="alarm-row"><div class="alarm-code">${a[0]}</div><div class="alarm-det"><div class="alarm-cause">${a[1]}</div><div class="alarm-act">${a[2]}</div></div></div>`);
  html+=`</div>`;

  // GCS
  html+=`<div class="sg">GLASGOW COMA SCALE</div><div style="padding:8px 14px 14px">`;
  const gcs=[
    ['Eye Opening','4=Spontaneous | 3=To Voice | 2=To Pain | 1=None'],
    ['Verbal','5=Oriented | 4=Confused | 3=Words | 2=Sounds | 1=None'],
    ['Motor','6=Obeys | 5=Localizes | 4=Withdraws | 3=Flexion | 2=Extension | 1=None'],
    ['Score 13–15','Mild | Score 9–12: Moderate | Score ≤8: SEVERE — intubation threshold'],
  ];
  gcs.forEach(([l,v])=>html+=`<div class="ref-row"><span class="ref-label" style="font-weight:600">${l}</span><span style="font-size:11px;color:var(--white);text-align:right;max-width:60%">${v}</span></div>`);
  html+=`</div>`;

  // Cincinnati
  html+=`<div class="sg">CINCINNATI PREHOSPITAL STROKE SCALE</div><div style="padding:8px 14px 14px">
    <div class="co i">Any single positive finding = POSITIVE stroke screen → pre-alert stroke center immediately. Document LKW time.</div>`;
  [['Facial Droop','Ask to show teeth or smile. Abnormal: one side does not move equally.'],
   ['Arm Drift','Eyes closed, arms out 10 sec. Abnormal: one arm drifts down.'],
   ['Speech','Repeat: "You can\'t teach an old dog new tricks." Abnormal: slurred, wrong words, unable.'],
  ].forEach(([l,v])=>html+=`<div class="ref-row"><span class="ref-label" style="font-weight:600;color:var(--teal2)">${l}</span><span style="font-size:11px;color:var(--white);text-align:right;max-width:65%">${v}</span></div>`);
  html+=`</div>`;

  // Broselow color bands
  html+=`<div class="sg">BROSELOW WEIGHT REFERENCE</div><div style="padding:8px 14px 14px">`;
  [['Grey','3–5 kg'],['Pink','6–7 kg'],['Red','8–9 kg'],['Purple','10–11 kg'],
   ['Yellow','12–14 kg'],['White','15–18 kg'],['Blue','19–23 kg'],['Orange','24–29 kg'],['Green','30–36 kg']
  ].forEach(([c,w])=>html+=`<div class="ref-row"><span class="ref-label">${c} Band</span><span class="ref-val">${w}</span></div>`);
  html+=`</div>`;

  // Rule of nines
  html+=`<div class="sg">RULE OF NINES — BURN TBSA</div><div style="padding:8px 14px 14px">`;
  [['Head & Neck','9%'],['Each Arm','9%'],['Anterior Trunk','18%'],['Posterior Trunk','18%'],
   ['Each Leg','18%'],['Genitalia','1%'],['Palm of hand (pt)','≈1% TBSA'],
   ['Parkland formula','4 mL × kg × %TBSA — give ½ in first 8 hours']
  ].forEach(([l,v])=>html+=`<div class="ref-row"><span class="ref-label">${l}</span><span class="ref-val">${v}</span></div>`);
  html+=`</div>`;

  // APGAR
  html+=`<div class="sg">APGAR SCORING</div><div style="padding:8px 14px 14px">`;
  [['Appearance (Color)','0=Blue/pale | 1=Blue extremities | 2=Pink'],
   ['Pulse','0=Absent | 1=<100 | 2=≥100 bpm'],
   ['Grimace','0=None | 1=Grimace | 2=Cry/cough'],
   ['Activity','0=Limp | 1=Some flexion | 2=Active'],
   ['Respiration','0=Absent | 1=Weak/irregular | 2=Strong cry'],
   ['Score 7–10','Normal | 4–6: Moderate concern | 0–3: Resuscitate'],
  ].forEach(([l,v])=>html+=`<div class="ref-row"><span class="ref-label">${l}</span><span style="font-size:11px;color:var(--white);text-align:right;max-width:60%">${v}</span></div>`);
  html+=`</div>`;

  container.innerHTML=html;
}

function calcDoses(wt){
  const w=parseFloat(wt);
  const el=document.getElementById('calc-results');
  if(!w||w<=0||w>150){el.innerHTML='';return}
  const doses=[
    ['Epinephrine (arrest)','0.01 mg/kg',(w*0.01).toFixed(2),'mg IV/IO'],
    ['Epinephrine (anaphylaxis)','0.01 mg/kg',(w*0.01).toFixed(2),'mg IM (max 0.3)'],
    ['Amiodarone (arrest)','5 mg/kg',Math.min(w*5,300).toFixed(0),'mg IV/IO (max 300mg)'],
    ['Adenosine (1st)','0.1 mg/kg',Math.min(w*0.1,6).toFixed(1),'mg (max 6mg)'],
    ['Midazolam (seizure)','0.1 mg/kg',Math.min(w*0.1,5).toFixed(1),'mg (max 5mg)'],
    ['Fentanyl','1–2 mcg/kg',w.toFixed(0)+'–'+(w*2).toFixed(0),'mcg (max 50mcg/dose)'],
    ['NS bolus','20 mL/kg',Math.min(w*20,60*w).toFixed(0),'mL'],
    ['D10% (hypoglycemia)','2–4 mL/kg',(w*2).toFixed(0)+'–'+(w*4).toFixed(0),'mL IV/IO'],
  ];
  let html=`<div class="calc-result"><div class="calc-result-label">DOSES FOR ${w} kg PATIENT</div>`;
  doses.forEach(([n,f,d,u])=>html+=`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a2a3a">
    <span style="font-size:11px;color:var(--gray)">${n}</span>
    <span style="font-family:var(--mono);font-size:12px;font-weight:600;color:var(--teal2)">${d} ${u}</span>
  </div>`);
  html+=`</div>`;
  el.innerHTML=html;
}

// ── OPEN DETAIL ──────────────────────────────────────────────────────────────
function openDetail(type,idx){
  const arr={ift:D.ift,viii:D.viii,formulary:D.formulary,procedures:D.procedures}[type];
  const item=arr[idx];
  const key=itemKey(type,idx);
  CURRENT={type,idx,item,key};
  addRecent(key);
  _renderDetail(item,key);
}

function openByKey(key){
  const [type,idx]=key.split(':');
  openDetail(type,parseInt(idx));
}

function _renderDetail(item,key){
  document.getElementById('dv-num').textContent=item.num||'';
  document.getElementById('dv-title').textContent=item.title||item.name||'';
  document.getElementById('dv-scope').innerHTML=scopeBadge(item.scope);
  document.getElementById('dv-fav').textContent=isFav(key)?'★':'☆';

  let html='';
  const type=CURRENT.type;

  if(type==='formulary'){
    if(item.mechanism)html+=`<div class="cs"><div class="cl">Mechanism</div><div class="ct">${item.mechanism}</div></div>`;
    if(item.indications?.length){
      html+=`<div class="cs"><div class="cl">Indications</div>`;
      item.indications.forEach(i=>html+=`<div class="step"><div class="sn">•</div><div class="st">${i}</div></div>`);
      html+=`</div>`;
    }
    if(item.contraindications?.length){
      html+=`<div class="cs"><div class="cl">Contraindications</div>`;
      item.contraindications.forEach(c=>html+=`<div class="co d">✕ ${c}</div>`);
      html+=`</div>`;
    }
    if(item.doses?.length){
      html+=`<div class="cs"><div class="cl">Dosing</div><table class="dt">`;
      item.doses.forEach(d=>html+=`<tr><td>${d.route}</td><td>${d.dose}</td></tr>`);
      html+=`</table></div>`;
    }
    if(item.notes?.length){
      html+=`<div class="cs"><div class="cl">Clinical Notes</div>`;
      item.notes.forEach(n=>html+=`<div class="co i">ℹ ${n}</div>`);
      html+=`</div>`;
    }
  } else {
    // Protocol or procedure
    if(item.overview)html+=`<div class="cs"><div class="cl">Overview</div><div class="ct">${item.overview}</div></div>`;
    if(item.vitals?.length){
      html+=`<div class="vs">`;
      item.vitals.forEach(v=>html+=`<div class="vc"><div class="vl">${v.label}</div><div class="vv">${v.val}</div></div>`);
      html+=`</div>`;
    }
    // Check if procedure (simple steps array)
    if(item.steps&&typeof item.steps[0]==='string'){
      html+=`<div class="cs"><div class="cl">Procedure Steps</div>`;
      item.steps.forEach((s,i)=>html+=`<div class="step"><div class="sn">${i+1}</div><div class="st">${s}</div></div>`);
      html+=`</div>`;
    } else if(item.emt_steps||item.aemt_steps||item.pm_steps){
      // Scope-tiered standing orders
      const emt=item.emt_steps||[];
      const aemt=item.aemt_steps||[];
      const pm=item.pm_steps||[];
      const maxR=Math.max(emt.length,aemt.length,pm.length);
      html+=`<div class="cs"><div class="cl">Standing Orders</div>
      <table class="sot"><thead><tr><th class="lc">#</th><th class="ec">EMT</th><th class="ac">AEMT</th><th class="pc">PM</th></tr></thead><tbody>`;
      for(let i=0;i<maxR;i++){
        html+=`<tr><td class="lc">${i+1}</td><td class="ec">${emt[i]||''}</td><td class="ac">${aemt[i]||''}</td><td class="pc">${pm[i]||''}</td></tr>`;
      }
      html+=`</tbody></table></div>`;
    }
    if(item.monitoring?.length){
      html+=`<div class="cs"><div class="cl">Transport Monitoring</div>`;
      item.monitoring.forEach(m=>html+=`<div class="mon-item"><div class="mon-dot"></div><div>${m}</div></div>`);
      html+=`</div>`;
    }
    if(item.diversion){
      html+=`<div class="cs"><div class="div-label">⚡ DIVERSION TRIGGERS</div><div class="div-box">${item.diversion}</div></div>`;
    }
    if(item.notes?.length){
      html+=`<div class="cs"><div class="cl">Critical Notes</div>`;
      item.notes.forEach(n=>html+=`<div class="co w">⚠ ${n}</div>`);
      html+=`</div>`;
    }
  }

  document.getElementById('dv-body').innerHTML=html;
  document.getElementById('dv').style.display='block';
  document.getElementById('dv').scrollTop=0;
  history.pushState({detail:true},'');
}

function closeDetail(){
  document.getElementById('dv').style.display='none';
  CURRENT=null;
}

// ── TAB SWITCHING ────────────────────────────────────────────────────────────
function switchTab(tab){
  TAB=tab;
  closeDetail();
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  renderList();
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
document.getElementById('bk').addEventListener('click',()=>{closeDetail();history.back()});
document.getElementById('dv-fav').addEventListener('click',function(){
  if(!CURRENT)return;
  toggleFav(CURRENT.key);
  this.textContent=isFav(CURRENT.key)?'★':'☆';
  renderList();
});
document.getElementById('srch').addEventListener('input',function(){
  QUERY=this.value.trim();
  document.getElementById('srch-clr').style.display=QUERY?'block':'none';
  renderList();
});
document.getElementById('srch-clr').addEventListener('click',function(){
  document.getElementById('srch').value='';
  QUERY='';this.style.display='none';renderList();
});
document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',function(){
  document.querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));
  this.classList.add('on');SCOPE=this.dataset.s;renderList();
}));
window.addEventListener('popstate',e=>{
  if(document.getElementById('dv').style.display==='block')closeDetail();
});

// PWA install
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  if(!localStorage.getItem('amrkc_install_dismissed')){
    document.getElementById('install-banner').style.display='flex';
  }
});
document.getElementById('ib-install').addEventListener('click',()=>{
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null}
  document.getElementById('install-banner').style.display='none';
});
document.getElementById('ib-close').addEventListener('click',()=>{
  document.getElementById('install-banner').style.display='none';
  localStorage.setItem('amrkc_install_dismissed','1');
});

// Service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(()=>{
    console.log('SW registered');
  }).catch(e=>console.log('SW failed:',e));
}

// INIT
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('loading').style.opacity='0';
    setTimeout(()=>document.getElementById('loading').style.display='none',400);
    updateHdrPad();
    renderList();
  },1200);
});
window.addEventListener('resize',updateHdrPad);
</script>
