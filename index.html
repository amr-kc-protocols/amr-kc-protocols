<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AMR KC Protocols">
<meta name="theme-color" content="#0a0e1a">
<meta name="description" content="AMR Kansas City Medical Protocols 2026">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>AMR KC Protocols 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');
:root{
  --navy:#0f1e3d;--navy2:#162447;--teal:#0d9488;--teal2:#14b8a6;
  --white:#f0f4f8;--gray:#8899aa;--dim:#1e2d45;
  --emt:#16a34a;--emt-bg:#052e16;
  --aemt:#2563eb;--aemt-bg:#0c1a3a;
  --pm:#7c3aed;--pm-bg:#1e0a3a;
  --warn:#f59e0b;--danger:#ef4444;--danger-bg:#2a0a0a;
  --surface:#111827;--surface2:#1a2540;--border:#1e3a5f;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:var(--sans);background:var(--surface);color:var(--white)}
#loading{position:fixed;inset:0;background:#060d1f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s}
.load-logo{font-family:var(--mono);font-size:48px;font-weight:600;color:var(--teal);letter-spacing:-0.02em;margin-bottom:4px}
.load-agency{font-size:11px;color:var(--gray);letter-spacing:0.16em;text-transform:uppercase}
.load-bar{width:180px;height:2px;background:var(--dim);border-radius:2px;margin-top:28px;overflow:hidden}
.load-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));animation:fill 1.4s cubic-bezier(0.4,0,0.2,1) forwards}
@keyframes fill{from{width:0}to{width:100%}}
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,#060d1f 0%,var(--navy) 100%);border-bottom:1px solid var(--teal)}
.hdr-top{display:flex;align-items:center;gap:10px;padding:10px 14px 6px}
.hdr-badge{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.hdr-icon{width:30px;height:30px;background:var(--teal);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;flex-shrink:0;font-family:var(--mono)}
.hdr-name{line-height:1.15;min-width:0}
.hdr-name .l1{font-size:12px;font-weight:700;letter-spacing:0.08em;color:var(--teal2);text-transform:uppercase}
.hdr-name .l2{font-size:9px;color:var(--gray);letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-status{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--gray);flex-shrink:0}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--emt);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.srch-wrap{padding:5px 14px 9px;position:relative}
#srch{width:100%;height:38px;background:var(--dim);border:1px solid var(--border);border-radius:7px;color:var(--white);font-family:var(--mono);font-size:15px;padding:0 38px 0 34px;outline:none;transition:border-color 0.15s;-webkit-appearance:none}
#srch:focus{border-color:var(--teal)}
#srch::placeholder{color:var(--gray)}
.srch-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:15px;pointer-events:none}
#srch-clr{position:absolute;right:26px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray);font-size:15px;cursor:pointer;padding:4px;display:none;line-height:1}
#main{padding-top:104px;padding-bottom:72px;min-height:100vh}
.sg{padding:16px 14px 5px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:0.14em;color:var(--teal);text-transform:uppercase;border-bottom:1px solid var(--border)}
.sg-sub{padding:7px 14px 3px;font-size:12px;color:var(--gray);letter-spacing:0.05em}
.card{margin:3px 10px;border-radius:9px;overflow:hidden;cursor:pointer;border:1px solid var(--border)}
.card:active{opacity:0.75}
.card-inner{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface2)}
.card-num{font-family:var(--mono);font-size:12px;color:var(--gray);flex-shrink:0;min-width:52px}
.card-title{flex:1;font-size:15px;font-weight:500;line-height:1.3}
.sbadge{flex-shrink:0;padding:2px 7px;border-radius:3px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:0.05em}
.sbadge.all{background:var(--emt-bg);color:var(--emt);border:1px solid var(--emt)}
.sbadge.aemt{background:var(--aemt-bg);color:var(--aemt);border:1px solid var(--aemt)}
.sbadge.pm{background:var(--pm-bg);color:var(--pm);border:1px solid var(--pm)}
.card-arr{color:var(--gray);font-size:12px;flex-shrink:0}
.fav-btn{background:none;border:none;font-size:16px;cursor:pointer;flex-shrink:0;padding:2px;line-height:1}
.no-res{text-align:center;padding:60px 20px;color:var(--gray);font-size:14px}
.res-label{padding:10px 14px 3px;font-family:var(--mono);font-size:9px;color:var(--gray);letter-spacing:0.08em}
.ug-card{margin:4px 10px;border-radius:9px;overflow:hidden;cursor:pointer;border:1px solid var(--border)}
.ug-card:active{opacity:0.75}
.ug-card-inner{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface2)}
.ug-card-icon{width:28px;height:28px;border-radius:5px;background:linear-gradient(135deg,var(--navy2),var(--dim));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ug-card-title{flex:1;font-size:15px;font-weight:500;line-height:1.3}
.ug-badge{flex-shrink:0;padding:2px 7px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.05em;background:rgba(13,148,136,0.15);color:var(--teal2);border:1px solid var(--teal)}
#dv{display:none;position:fixed;inset:0;z-index:200;background:var(--surface);overflow-y:auto;-webkit-overflow-scrolling:touch}
.dv-hdr{position:sticky;top:0;z-index:10;background:var(--navy);border-bottom:2px solid var(--teal);padding:11px 14px;display:flex;align-items:flex-start;gap:10px}
.back{background:var(--dim);border:1px solid var(--border);color:var(--teal2);font-size:12px;font-weight:600;padding:6px 11px;border-radius:5px;cursor:pointer;flex-shrink:0;font-family:var(--sans)}
.dv-meta{flex:1;min-width:0}
.dv-num{font-family:var(--mono);font-size:9px;color:var(--gray)}
.dv-title{font-size:17px;font-weight:700;line-height:1.2;margin-top:2px}
.dv-scope{margin-top:4px;display:inline-block}
.dv-fav{background:none;border:none;font-size:22px;cursor:pointer;padding:2px;line-height:1;flex-shrink:0;align-self:center}
.dv-body{padding:14px}
.cs{margin-bottom:20px}
.cl{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.1em;color:var(--teal);text-transform:uppercase;padding-bottom:5px;border-bottom:1px solid var(--border);margin-bottom:8px}
.ct{font-size:15px;line-height:1.6;color:#cbd5e1}
.vs{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none;margin-bottom:14px}
.vs::-webkit-scrollbar{display:none}
.vc{flex-shrink:0;background:var(--dim);border:1px solid var(--border);border-radius:7px;padding:7px 11px;text-align:center;min-width:72px}
.vl{font-size:9px;color:var(--gray);font-family:var(--mono);margin-bottom:2px}
.vv{font-size:13px;font-weight:700;color:var(--teal2);font-family:var(--mono)}
.step{display:flex;gap:8px;margin-bottom:8px}
.sn{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--teal);color:#000;font-weight:700;font-size:10px;display:flex;align-items:center;justify-content:center;margin-top:1px;font-family:var(--mono)}
.st{font-size:15px;line-height:1.5;color:#cbd5e1}
.co{border-left:3px solid;padding:9px 11px;border-radius:0 7px 7px 0;margin-bottom:8px;font-size:14px;line-height:1.5}
.co.w{border-color:var(--warn);background:#1a1200;color:#fde68a}
.co.d{border-color:var(--danger);background:var(--danger-bg);color:#fca5a5}
.co.i{border-color:var(--teal);background:#001a18;color:#99f6e4}
.dt{width:100%;font-size:14px}
.dt td{padding:6px 7px;border-bottom:1px solid #1a2a3a;vertical-align:top}
.dt td:first-child{color:var(--gray);font-family:var(--mono);width:38%}
.dt td:last-child{color:var(--white)}
.mon-item{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #152030;font-size:15px;color:#cbd5e1}
.mon-dot{flex-shrink:0;width:5px;height:5px;border-radius:50%;background:var(--teal2);margin-top:6px}
.div-box{background:#1a0a0a;border:1px solid var(--danger);border-radius:7px;padding:10px 12px;font-size:14px;color:#fca5a5;line-height:1.5;margin-bottom:10px}
.div-label{font-family:var(--mono);font-size:9px;color:var(--danger);letter-spacing:0.1em;font-weight:600;margin-bottom:4px}
.sot{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px}
.sot th{padding:7px 6px;text-align:center;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.06em;border-bottom:1px solid var(--border)}
.sot th.ec{color:var(--emt)}.sot th.ac{color:var(--aemt)}.sot th.pc{color:var(--pm)}
.sot th.lc{text-align:left;color:var(--gray);font-size:8px}
.sot td{padding:7px 5px;border-bottom:1px solid #152030;vertical-align:top;line-height:1.5;font-size:13px}
.sot td.lc{font-size:9px;color:var(--gray);font-family:var(--mono);width:20px}
.sot td.ec{background:#050d05}.sot td.ac{background:#050a14}.sot td.pc{background:#0a0514}
.ug-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
.ug-table th{padding:8px 6px;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.06em;border-bottom:2px solid var(--border);text-align:center}
.ug-table th:first-child{text-align:left;color:var(--gray)}
.ug-table th.ec{color:var(--emt)}.ug-table th.ac{color:var(--aemt)}.ug-table th.pc{color:var(--pm)}
.ug-table tr.sec-hdr td{background:var(--navy2);font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.1em;color:var(--teal);padding:6px 7px;border-top:2px solid var(--border)}
.ug-table td{padding:7px;border-bottom:1px solid #152030;font-size:12px;vertical-align:middle}
.ug-table td:not(:first-child){text-align:center;font-family:var(--mono);font-size:13px}
.ug-table td.auth{color:var(--emt)}.ug-table td.noauth{color:var(--gray)}
.ug-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
.rv-wrap{padding:12px 14px}
.rv-label{font-family:var(--mono);font-size:9px;color:var(--gray);letter-spacing:0.1em;margin-bottom:8px}
.rv-chips{display:flex;gap:6px;flex-wrap:wrap}
.rv-chip{background:var(--dim);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:11px;cursor:pointer;color:var(--white);font-family:var(--mono)}
.calc-wrap{background:var(--dim);border:1px solid var(--teal);border-radius:10px;padding:14px;margin-bottom:16px}
.calc-title{font-family:var(--mono);font-size:10px;color:var(--teal);letter-spacing:0.08em;margin-bottom:10px}
.calc-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.calc-label{font-size:12px;color:var(--gray);min-width:60px}
.calc-input{background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--white);font-family:var(--mono);font-size:15px;padding:7px 10px;width:80px;outline:none;text-align:center;-webkit-appearance:none}
.calc-result{background:var(--navy);border-radius:7px;padding:10px 12px;margin-top:8px}
.calc-result-label{font-size:10px;color:var(--gray);font-family:var(--mono);margin-bottom:3px}
.ref-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);align-items:baseline;gap:8px}
.ref-label{font-size:14px;color:var(--gray);flex-shrink:0}
.ref-val{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--teal2);text-align:right}
.alarm-row{display:flex;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.alarm-code{flex-shrink:0;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--danger);min-width:90px}
.alarm-det{flex:1}
.alarm-cause{font-size:13px;color:var(--gray);margin-bottom:3px}
.alarm-act{font-size:14px;color:var(--white)}
.ped-item{background:var(--dim);padding:9px 11px;border-radius:6px;margin-bottom:3px}
.ped-drug{font-size:14px;font-weight:600;color:var(--teal2);margin-bottom:2px}
.ped-dose{font-family:var(--mono);font-size:13px;color:var(--white)}
#nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--navy);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 2px 5px;cursor:pointer;border:none;background:none;color:var(--gray);font-size:9px;font-family:var(--sans);gap:2px;transition:color 0.12s}
.nb.on{color:var(--teal2)}
.nb-icon{font-size:17px;line-height:1}
#install-banner{position:fixed;bottom:72px;left:10px;right:10px;z-index:150;background:var(--navy2);border:1px solid var(--teal);border-radius:10px;padding:12px 14px;display:none;align-items:center;gap:10px}
.ib-text{flex:1;font-size:12px;line-height:1.4;color:var(--white)}
.ib-btn{background:var(--teal);color:#000;border:none;border-radius:5px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
.ib-close{background:none;border:none;color:var(--gray);font-size:16px;cursor:pointer;flex-shrink:0}
.hl{color:var(--teal2);background:rgba(13,148,136,0.15);border-radius:2px;padding:0 2px}

/* ── V-6 INTERACTIVE STYLES ────────────────────────────────────────────── */
.v6-section { margin-bottom: 20px; }
.v6-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; }
.v6-tabs::-webkit-scrollbar { display: none; }
.v6-tab { flex-shrink: 0; padding: 8px 14px; font-size: 11px; font-weight: 600; color: var(--gray); border-bottom: 2px solid transparent; cursor: pointer; font-family: var(--mono); letter-spacing: 0.04em; white-space: nowrap; transition: all 0.15s; }
.v6-tab.on { color: var(--teal2); border-color: var(--teal2); }
.v6-pane { display: none; }
.v6-pane.on { display: block; }

/* IBW Calculator */
.ibw-wrap { background: var(--dim); border: 1px solid var(--teal); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
.ibw-title { font-family: var(--mono); font-size: 9px; color: var(--teal); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
.ibw-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
.ibw-label { font-size: 12px; color: var(--gray); min-width: 56px; }
.ibw-input { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; color: var(--white); font-family: var(--mono); font-size: 15px; padding: 7px 10px; width: 80px; outline: none; text-align: center; -webkit-appearance: none; }
.ibw-input:focus { border-color: var(--teal); }
.ibw-unit { font-family: var(--mono); font-size: 11px; color: var(--gray); }
.ibw-gender { display: flex; gap: 8px; }
.gender-btn { flex: 1; padding: 7px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface); color: var(--gray); font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s; font-family: var(--sans); }
.gender-btn.on { background: var(--teal); border-color: var(--teal); color: #000; }
.ibw-result { background: var(--navy); border-radius: 8px; padding: 12px; margin-top: 10px; }
.ibw-result-row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 1px solid #1a2a3a; gap: 8px; }
.ibw-result-row:last-child { border-bottom: none; }
.ibw-result-label { font-size: 11px; color: var(--gray); }
.ibw-result-val { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--teal2); }
.ibw-result-val.warn { color: var(--warn); }
.ibw-result-val.danger { color: var(--danger); }
.ibw-result-note { font-size: 10px; color: var(--gray); margin-top: 4px; font-style: italic; }

/* Troubleshooting */
.ts-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.ts-problem { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
.ts-problem.open { border-color: var(--teal); }
.ts-problem-hdr { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
.ts-problem-icon { font-size: 18px; flex-shrink: 0; }
.ts-problem-title { flex: 1; font-size: 14px; font-weight: 600; color: var(--white); }
.ts-chevron { color: var(--gray); font-size: 12px; flex-shrink: 0; transition: transform 0.2s; }
.ts-problem.open .ts-chevron { transform: rotate(90deg); }
.ts-problem-body { display: none; padding: 0 14px 14px; }
.ts-problem.open .ts-problem-body { display: block; }
.ts-dx { margin-bottom: 10px; }
.ts-dx-label { font-family: var(--mono); font-size: 9px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.ts-dx-item { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid #152030; font-size: 14px; color: #cbd5e1; align-items: flex-start; }
.ts-dx-bullet { flex-shrink: 0; width: 5px; height: 5px; border-radius: 50%; background: var(--warn); margin-top: 5px; }
.ts-steps { }
.ts-steps-label { font-family: var(--mono); font-size: 9px; color: var(--teal); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.ts-step-item { display: flex; gap: 8px; margin-bottom: 7px; align-items: flex-start; }
.ts-step-num { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; background: var(--teal); color: #000; font-weight: 700; font-size: 10px; display: flex; align-items: center; justify-content: center; margin-top: 1px; font-family: var(--mono); }
.ts-step-text { font-size: 14px; line-height: 1.5; color: #cbd5e1; }
.ts-critical { background: var(--danger-bg); border: 1px solid var(--danger); border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; font-size: 14px; color: #fca5a5; line-height: 1.5; }


/* ── DIAGNOSTIC TREE ──────────────────────────────────────────────────── */
.dt-wrap { padding: 0; }
.dt-breadcrumb { display: flex; align-items: center; gap: 6px; padding: 10px 14px 0; flex-wrap: wrap; min-height: 36px; }
.dt-crumb { font-family: var(--mono); font-size: 10px; color: var(--gray); cursor: pointer; }
.dt-crumb:hover { color: var(--teal2); }
.dt-crumb-sep { font-size: 10px; color: var(--border); }
.dt-crumb.current { color: var(--teal2); cursor: default; }
.dt-question { padding: 14px 14px 6px; }
.dt-q-text { font-size: 16px; font-weight: 700; color: var(--white); line-height: 1.3; margin-bottom: 4px; }
.dt-q-sub { font-size: 12px; color: var(--gray); }
.dt-opts { padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
.dt-opt { display: flex; align-items: center; gap: 12px; padding: 13px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.12s; }
.dt-opt:active { border-color: var(--teal); background: var(--dim); transform: scale(0.98); }
.dt-opt-icon { font-size: 22px; flex-shrink: 0; width: 30px; text-align: center; }
.dt-opt-label { flex: 1; font-size: 14px; font-weight: 500; color: var(--white); line-height: 1.3; }
.dt-opt-arr { color: var(--gray); font-size: 14px; flex-shrink: 0; }

/* Results */
.dt-result { padding: 14px; }
.dt-result-summary { background: var(--dim); border-left: 3px solid var(--teal); border-radius: 0 8px 8px 0; padding: 10px 12px; margin-bottom: 14px; font-size: 14px; color: #cbd5e1; line-height: 1.5; }
.dt-result-label { font-family: var(--mono); font-size: 9px; color: var(--teal); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }

      "overview": "Operation reference for LIFEPAK 15 monitor/defibrillator. For clinical indications and energy settings see V-14 (Cardiac Monitoring), V-15 (Cardioversion), and V-16 (Pacing).",

        "Apply monitoring: QUIK-COMBO pads (preferred) for monitoring and therapy; or 4-lead cable for monitoring only.",
        "SpO2: connect sensor; attach to finger or forehead; confirm waveform displayed.",
        "ETCO2: connect sampling line to airway; confirm numeric and waveform display.",
        "NIBP: connect cuff; press START for automatic cycle.",
        "Defibrillation (unsynchronized): select ENERGY; press CHARGE; confirm charged; CLEAR; press SHOCK.",
        "Synchronized cardioversion: press SYNC; confirm markers on R-waves; select energy; CHARGE; CLEAR; hold SHOCK.",
        "Transcutaneous pacing: press PACER; set rate and mA; confirm pacing output."
      ],
      "notes": [
        "QUIK-COMBO pads allow monitoring AND defibrillation without pad change — preferred over hard paddles.",
        "Confirm SYNC is ON before cardioversion — SYNC button light must be illuminated.",
        "For defibrillation: SYNC must be OFF — check before shocking pulseless patient.",
        "Low battery alarm: connect to AC power immediately. Device has internal battery backup only."
      ]

    {
      "id": "ug-vascular",
      "title": "Vascular Access Standards",
      "content": [
        {
          "label": "Access Method Priority",
          "items": [
            "Peripheral IV — First-line for most patients. Antecubital, forearm, and hand sites. External jugular (EJ) is Paramedic only.",
            "Intraosseous (IO / EZ-IO) — For hemodynamically unstable patients or cardiac arrest when peripheral IV is not rapidly achievable. AEMT and Paramedic authorized.",
            "Pre-existing Central Line — Paramedic only. Access and flush only — do not insert new central lines in the field.",
            "Dialysis AV Graft / Fistula — Last resort only, Paramedic only, with DMO authorization."
          ]
        },
        {
          "label": "Clinical Decision Points",
          "items": [
            "The decision to obtain vascular access requires clinical judgment. Benefits must outweigh risks including patient discomfort and transport delay.",
            "Number of attempts before transitioning to another method also requires provider judgment.",
            "Any medication approved for IV administration may also be given IO when IV access is unavailable."
          ]
        }
      ]
    },
    {
      "id": "ug-meds",
      "title": "Medication Administration Standards",
      "content": [
        {
          "label": "Standing Rules — All Providers",
          "items": [
            "No medication shall be administered to a patient with a known hypersensitivity to that medication or drug class.",
            "Medications prepared for administration must not be mixed in the same syringe with any other medication.",
            "Medication infusions initiated by a sending hospital may be continued in transport. Titration outside the listed formulary requires written orders from the sending facility and attending RN or physician.",
            "Any medication approved for IV administration may also be administered via IO when IV access is unavailable.",
            "IM medications should be administered in the lateral thigh unless anatomically contraindicated.",
            "Intranasal (IN) medications require a mucosal atomization device (MAD). Maximum 1 mL per nostril.",
            "All medications must be documented with dose, route, time, and patient response."
          ]
        },
        {
          "label": "Dual Verification Requirement",
          "items": [
            "Hospital-supplied high-alert medications (heparin, insulin, concentrated electrolytes, vasopressors, antiarrhythmics) require dual verification of drug, concentration, and infusion rate at departure.",
            "Document both verifying providers by name on the patient care report."
          ]
        }
      ]
    },
    {
      "id": "ug-universal-care",
      "title": "Universal Care Guidelines",
      "content": [
        {
          "label": "These Apply to Every Patient Encounter",
          "text": "Universal Care Guidelines reduce redundancy across protocols. They apply unless a specific protocol states otherwise. All guidelines apply to both adult and pediatric patients unless explicitly stated."
        },
        {
          "label": "Oxygen Administration",
          "items": [
            "Do NOT administer supplemental oxygen routinely — apply only when clinically indicated.",
            "Titrate to SpO2 ≥94% for most patients.",
            "COPD and chronic hypercapnia: target SpO2 88–92%.",
            "Post-cardiac arrest (ROSC): target SpO2 94–98% — avoid hyperoxia.",
            "Trauma, shock: apply oxygen liberally until stabilized."
          ]
        },
        {
          "label": "Patient Positioning",
          "items": [
            "Respiratory distress: upright (high Fowler) unless contraindicated.",
            "Hypotension without respiratory compromise: supine, legs elevated if no spinal concern.",
            "Stroke / head injury: HOB 0–30 degrees.",
            "Pregnant patient (>20 weeks): left lateral decubitus to prevent aortocaval compression.",
            "Unconscious / vomiting risk: lateral (recovery position)."
          ]
        },
        {
          "label": "Monitoring Standards",
          "items": [
            "Continuous cardiac monitoring for all ALS patients.",
            "Pulse oximetry continuously for all patients on oxygen or with respiratory complaints.",
            "Waveform capnography (ETCO2) for all intubated patients and during CPR — mandatory.",
            "Blood pressure at minimum every 5 minutes for unstable patients; every 15 minutes for stable.",
            "Blood glucose for any patient with altered mental status.",
            "12-lead ECG within 10 minutes for chest pain."
          ]
        },
        {
          "label": "Documentation Requirements",
          "items": [
            "All interventions documented with time, dose, route, and patient response.",
            "Vital signs at departure, every 5 minutes for unstable patients, on arrival.",
            "All medication infusions: drug, concentration, rate, and any changes during transport.",
            "Waveform capnography confirmation documented for all intubated patients.",
            "Precise times for stroke (LKW), STEMI (symptom onset, 12-lead time, cath lab notification), and cardiac arrest (collapse, CPR start, first shock, ROSC)."
          ]
        }
      ]
    },
    {
      "id": "ug-transport",
      "title": "Transport Standards and Lights & Sirens",
      "content": [
        {
          "label": "IFT Transport Principle",
          "text": "Routine use of emergency lights and sirens is NOT warranted in interfacility transport and unnecessarily jeopardizes the patient, EMS providers, and the public. IFT calls are not emergencies by default."
        },
        {
          "label": "Lights and Sirens Criteria",
          "items": [
            "L&S requires clinical justification — document the clinical reason.",
            "Escalation to L&S transport should be communicated to the receiving facility.",
            "When L&S is used, maintain speeds appropriate to vehicle and road conditions."
          ]
        },
        {
          "label": "Restraints During Transport",
          "items": [
            "Every patient must be appropriately restrained during transport using the ambulance cot restraint system.",
            "Pediatric patients: use approved pediatric restraint system.",
            "Psychiatric or combative patients: soft restraints per behavioral emergency protocol with documentation.",
            "Restraints must not compromise airway, circulation, or respiratory function."
          ]
        },
        {
          "label": "Pre-Alert Requirements",
          "items": [
            "STEMI: immediately upon identification — activate cath lab before arrival.",
            "Stroke: immediately upon positive Cincinnati screen — activate stroke team.",
            "Septic shock, trauma, cardiac arrest with ROSC: pre-alert receiving facility en route.",
            "Any patient requiring immediate intervention on arrival."
          ]
        }
      ]
    }

  "section_iv": [
    {
      "id": "iv-overview",
      "title": "Overview & Crew Authority",
      "icon": "📋",
      "content": [
        {
          "label": "Purpose",
          "text": "This section covers medications and infusions initiated at the sending facility and continued during transport. It is distinct from the Ambulance Formulary (Section III). This section focuses on transport verification, monitoring, complication recognition, diversion triggers, and documentation."
        },
        {
          "label": "Crew Authority by Level",
          "items": [
            "EMT: IV-A general guideline only. Maintain NS continuity. No medication infusion monitoring beyond NS.",
            "AEMT: May monitor hospital-supplied infusions that correspond to medications within KBEMS-authorized scope only. See IV-B authorized list. If any running infusion is not on that list: contact dispatch immediately — do not depart.",
            "Paramedic: All of Section IV applies. May manage, monitor, and titrate hospital-supplied infusions within service protocol and sending physician orders."
          ]
        },
        {
          "label": "Non-Redundancy Rule",
          "text": "When a hospital-supplied medication is also carried in the AMR formulary (e.g., midazolam, fentanyl, amiodarone, lidocaine), refer to Section III for indications and pharmacology. This section provides transport-phase monitoring and management only."
        }
      ]
    },
    {
      "id": "iv-verification",
      "title": "Pre-Departure Verification",
      "icon": "✅",
      "content": [
        {
          "label": "Required Before Every Departure — All Active Infusions",
          "items": [
            "Confirm medication name and concentration (mg/mL or mcg/mL).",
            "Confirm ordered dose or rate (mcg/min, mcg/kg/min, units/hr, mg/hr).",
            "Confirm current pump rate and compare to the order.",
            "Trace tubing from bag or syringe to patient (line trace) and label the line.",
            "Confirm vascular access type (PIV, IO, PICC, central line) and patency.",
            "Confirm adequate volume remaining for transport time plus safety buffer.",
            "Confirm backup plan for pump failure.",
            "Verify sending provider contact and receiving report is complete."
          ]
        },
        {
          "label": "Infusion Pump & Line Safety",
          "items": [
            "Use Sapphire infusion pumps per service standard whenever compatible.",
            "Maintain dedicated lines for high-risk infusions: vasopressors, insulin, heparin, and sedation should not share a line.",
            "Do not piggyback incompatible medications without explicit pharmacy guidance.",
            "Never interrupt vasopressor or sedation infusions during patient movement."
          ]
        },
        {
          "label": "Transport Default Targets",
          "items": [
            "MAP: ≥65 mmHg (adults)",
            "SBP minimum: ≥90 mmHg (adults)",
            "SpO2: ≥94% (94–98% post-ROSC; 88–92% COPD)",
            "ETCO2 (intubated): 35–40 mmHg unless specific order",
            "Glucose: 140–180 mg/dL for most ICU patients — follow sending orders"
          ]
        },
        {
          "label": "Documentation — All Hospital-Supplied Infusions",
          "items": [
            "Medication name and concentration.",
            "Ordered dose or rate if provided by sending physician.",
            "Starting pump rate at departure and any rate changes during transport.",
            "Vital signs at minimum every 5–15 minutes depending on acuity.",
            "Vascular access type and line patency checks performed.",
            "Any alarms, interruptions, or troubleshooting steps taken.",
            "Any adverse effects and actions taken.",
            "Receiving facility handoff confirmation."
          ]
        }
      ]

// ── STATE ─────────────────────────────────────────────────────────────────
let TAB = 'universal', QUERY = '', CURRENT = null;
let FAVS = JSON.parse(localStorage.getItem('amrkc_favs') || '[]');
let RECENT = JSON.parse(localStorage.getItem('amrkc_recent') || '[]');
let deferredPrompt = null;

const UG_ICONS = {
  'ug-auth': '&#x2696;', 'ug-scope': '&#x1F4CA;', 'ug-vascular': '&#x1F489;',
  'ug-meds': '&#x1F48A;', 'ug-universal-care': '&#x1FA7A;', 'ug-transport': '&#x1F691;'
};

// ── HELPERS ───────────────────────────────────────────────────────────────
function scopeLabel(s) {
  return {all: 'ALL LEVELS', aemt: 'AEMT+', pm: 'PM ONLY'}[s] || s.toUpperCase();
}
function scopeBadge(s) {
  return '<span class="sbadge ' + s + '">' + scopeLabel(s) + '</span>';
}
function matchSearch(item) {
  if (!QUERY) return true;
  const q = QUERY.toLowerCase();
  const t = (item.title || item.name || '') + ' ' + (item.num || '') + ' ' +
            (item.tags || []).join(' ') + ' ' + (item.overview || '') + (item.id || '');
  return t.toLowerCase().includes(q);
}
function hl(text) {
  if (!QUERY) return text;
  const escaped = QUERY.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<span class="hl">$1</span>');
}
function isFav(k) { return FAVS.includes(k); }
function toggleFav(k) {
  FAVS = isFav(k) ? FAVS.filter(x => x !== k) : [k, ...FAVS];
  localStorage.setItem('amrkc_favs', JSON.stringify(FAVS));
}
function addRecent(k) {
  RECENT = [k, ...RECENT.filter(x => x !== k)].slice(0, 8);
  localStorage.setItem('amrkc_recent', JSON.stringify(RECENT));
}
function itemByKey(key) {
  const parts = key.split(':');
  const type = parts[0], idx = parseInt(parts[1]);
  if (type === 'universal') return D.universal[idx];
  return ({ift: D.ift, viii: D.viii, formulary: D.formulary, procedures: D.procedures}[type] || [])[idx];
}
function itemKey(type, idx) { return type + ':' + idx; }
function updateHdrPad() {
  document.getElementById('main').style.paddingTop = (document.getElementById('hdr').offsetHeight + 6) + 'px';
}

// ── RENDER LIST ───────────────────────────────────────────────────────────
function renderList() {
  const c = document.getElementById('lv');
  let h = '';

  if (TAB === 'reference') { renderReference(); return; }
  if (TAB === 'diagnose') { renderDiagTree(); return; }

  if (TAB === 'universal') {
    const fil = D.universal.filter(matchSearch);
    if (QUERY) h += '<div class="res-label">' + fil.length + ' RESULT' + (fil.length !== 1 ? 'S' : '') + '</div>';
    h += '<div class="sg">UNIVERSAL GUIDELINES &mdash; APPLIES TO ALL ENCOUNTERS</div>';
    D.universal.forEach(function(item, idx) {
      if (!matchSearch(item)) return;
      const icon = UG_ICONS[item.id] || '&#x1F4CB;';
      h += '<div class="ug-card" data-type="universal" data-idx="' + idx + '">';
      h += '<div class="ug-card-inner">';
      h += '<div class="ug-card-icon">' + icon + '</div>';
      h += '<div class="ug-card-title">' + hl(item.title) + '</div>';
      h += '<span class="ug-badge">UNIVERSAL</span>';
      h += '<div style="color:var(--gray);font-size:12px;margin-left:4px">&#x203A;</div>';
      h += '</div></div>';
    });
    c.innerHTML = h;
    return;
  }

  const sources = {ift: D.ift, viii: D.viii, formulary: D.formulary, procedures: D.procedures};
  const items = sources[TAB] || [];
  const fil = items.map(function(item, idx) { return {item: item, idx: idx}; }).filter(function(x) { return matchSearch(x.item); });

  if (QUERY) h += '<div class="res-label">' + fil.length + ' RESULT' + (fil.length !== 1 ? 'S' : '') + ' IN ' + TAB.toUpperCase() + '</div>';

  if (!QUERY && (TAB === 'ift') && RECENT.length) {
    h += '<div class="rv-wrap"><div class="rv-label">RECENTLY VIEWED</div><div class="rv-chips">';
    RECENT.slice(0, 6).forEach(function(key) {
      const item = itemByKey(key);
      if (item) {
        const label = ((item.num || '') + ' ' + (item.title || item.name || '')).trim();
        h += '<div class="rv-chip" data-key="' + key + '">' + label + '</div>';
      }
    });
    h += '</div></div>';
  }

  if (fil.length === 0) { h += '<div class="no-res">No results found.</div>'; c.innerHTML = h; return; }

  let lastSec = '', lastGrp = '';
  fil.forEach(function(x) {
    const item = x.item, idx = x.idx;
    const sec = item.section || '', grp = item.group || '';
    if (sec !== lastSec) { h += '<div class="sg">' + (sec || TAB.toUpperCase()) + '</div>'; lastSec = sec; lastGrp = ''; }
    if (grp && grp !== lastGrp) { h += '<div class="sg-sub">' + grp + '</div>'; lastGrp = grp; }
    const key = itemKey(TAB, idx);
    const favStar = isFav(key) ? '&#x2605;' : '&#x2606;';
    h += '<div class="card" data-type="' + TAB + '" data-idx="' + idx + '">';
    h += '<div class="card-inner">';
    h += '<div class="card-num">' + item.num + '</div>';
    h += '<div class="card-title">' + hl(item.title || item.name || '') + '</div>';
    h += scopeBadge(item.scope);
    h += '<button class="fav-btn" data-key="' + key + '">' + favStar + '</button>';
    h += '<div class="card-arr">&#x203A;</div>';
    h += '</div></div>';
  });

  c.innerHTML = h;
}

// ── EVENT DELEGATION (no inline onclick) ──────────────────────────────────
document.getElementById('lv').addEventListener('click', function(e) {
  // Fav button
  const favBtn = e.target.closest('.fav-btn');
  if (favBtn) {
    e.stopPropagation();
    const key = favBtn.dataset.key;
    toggleFav(key);
    favBtn.innerHTML = isFav(key) ? '&#x2605;' : '&#x2606;';
    if (CURRENT && CURRENT.key === key) document.getElementById('dv-fav').innerHTML = isFav(key) ? '&#x2605;' : '&#x2606;';
    return;
  }
  // Recently viewed chip
  const chip = e.target.closest('.rv-chip');
  if (chip) { openByKey(chip.dataset.key); return; }
  // Card
  const card = e.target.closest('.card, .ug-card');
  if (card) { openDetail(card.dataset.type, parseInt(card.dataset.idx)); }
});

// Nav tabs — event delegation
document.getElementById('nav').addEventListener('click', function(e) {
  const btn = e.target.closest('.nb');
  if (btn && btn.dataset.tab) switchTab(btn.dataset.tab);
});

function calcDoses(wt) {
  const w = parseFloat(wt);
  const el = document.getElementById('calc-results');
  if (!el) return;
  if (!w || w <= 0 || w > 150) { el.innerHTML = ''; return; }
  const doses = [
    ['Epi (arrest)', (w * 0.01).toFixed(2) + ' mg IV/IO (max 1 mg)'],
    ['Epi (anaphylaxis)', Math.min(w * 0.01, 0.3).toFixed(2) + ' mg IM (max 0.3 mg)'],
    ['Amiodarone (arrest)', Math.min(w * 5, 300).toFixed(0) + ' mg IV/IO (max 300 mg)'],
    ['Adenosine 1st', Math.min(w * 0.1, 6).toFixed(1) + ' mg (max 6 mg)'],
    ['Adenosine 2nd', Math.min(w * 0.2, 12).toFixed(1) + ' mg (max 12 mg)'],
    ['Midazolam (sz)', Math.min(w * 0.1, 5).toFixed(1) + ' mg (max 5 mg)'],
    ['Fentanyl', Math.min(w, 50).toFixed(0) + '&ndash;' + Math.min(w * 2, 50).toFixed(0) + ' mcg (max 50 mcg/dose)'],
    ['NS bolus', (w * 20).toFixed(0) + ' mL IV/IO'],
    ['D10% (hypoglycemia)', (w * 2).toFixed(0) + '&ndash;' + (w * 4).toFixed(0) + ' mL IV/IO'],
    ['Atropine', Math.min(Math.max(w * 0.02, 0.1), 0.5).toFixed(2) + ' mg (min 0.1, max 0.5)'],
  ];
  let h = '<div class="calc-result"><div class="calc-result-label">DOSES FOR ' + w + ' kg PATIENT</div>';
  doses.forEach(function(d) {
    h += '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a2a3a;gap:8px">';
    h += '<span style="font-size:11px;color:var(--gray);flex-shrink:0">' + d[0] + '</span>';
    h += '<span style="font-family:var(--mono);font-size:12px;font-weight:600;color:var(--teal2);text-align:right">' + d[1] + '</span>';
    h += '</div>';
  });
  h += '</div>';
  el.innerHTML = h;
}

// ── OPEN DETAIL ───────────────────────────────────────────────────────────
function openDetail(type, idx) {
  let item;
  if (type === 'universal') item = D.universal[idx];
  else item = ({ift: D.ift, viii: D.viii, formulary: D.formulary, procedures: D.procedures}[type] || [])[idx];
  if (!item) return;
  const key = itemKey(type, idx);
  CURRENT = {type: type, idx: idx, item: item, key: key};
  addRecent(key);
  renderDetail(item, key, type);
}
function openByKey(key) {
  const parts = key.split(':');
  openDetail(parts[0], parseInt(parts[1]));
}

function renderDetail(item, key, type) {
  document.getElementById('dv-num').textContent = item.num || '';
  document.getElementById('dv-title').textContent = item.title || item.name || '';
  document.getElementById('dv-scope').innerHTML = item.scope ? scopeBadge(item.scope) : '<span class="ug-badge">UNIVERSAL</span>';
  document.getElementById('dv-fav').innerHTML = isFav(key) ? '&#x2605;' : '&#x2606;';

  let h = '';

  // ── SPECIAL: V-6 LTV 1200 interactive view ──────────────────────────
  if (type === 'procedures' && item.num === 'V-6') {
    renderV6Detail();
    document.getElementById('dv').style.display = 'block';
    document.getElementById('dv').scrollTop = 0;
    history.pushState({detail: true}, '');
    return;
  }

  if (type === 'universal') {
    (item.content || []).forEach(function(sec) {
      h += '<div class="cs"><div class="cl">' + sec.label + '</div>';
      if (sec.text) h += '<div class="ct">' + sec.text + '</div>';
      (sec.items || []).forEach(function(it, i) {
        h += '<div class="step"><div class="sn">' + (i + 1) + '</div><div class="st">' + it + '</div></div>';
      });
      h += '</div>';
    });
    if (item.scope_table) {
      h += '<div class="cs"><div class="cl">Scope of Practice Table</div>';
      h += '<table class="ug-table"><thead><tr><th>Skill / Intervention</th><th class="ec">EMT</th><th class="ac">AEMT</th><th class="pc">PM</th></tr></thead><tbody>';
      item.scope_table.sections.forEach(function(sec) {
        h += '<tr class="sec-hdr"><td colspan="4">' + sec.name + '</td></tr>';
        sec.rows.forEach(function(row) {
          h += '<tr><td>' + row[0] + '</td>';
          [row[1], row[2], row[3]].forEach(function(v) {
            h += '<td class="' + (v === '✓' ? 'auth' : 'noauth') + '">' + v + '</td>';
          });
          h += '</tr>';
        });
      });
      h += '</tbody></table></div>';
    }
  } else if (type === 'formulary') {
    if (item.mechanism) h += '<div class="cs"><div class="cl">Mechanism</div><div class="ct">' + item.mechanism + '</div></div>';
    if (item.indications && item.indications.length) {
      h += '<div class="cs"><div class="cl">Indications</div>';
      item.indications.forEach(function(ind) { h += '<div class="step"><div class="sn">&bull;</div><div class="st">' + ind + '</div></div>'; });
      h += '</div>';
    }
    if (item.contraindications && item.contraindications.length) {
      h += '<div class="cs"><div class="cl">Contraindications</div>';
      item.contraindications.forEach(function(con) { h += '<div class="co d">&#x2715; ' + con + '</div>'; });
      h += '</div>';
    }
    if (item.doses && item.doses.length) {
      h += '<div class="cs"><div class="cl">Dosing</div><table class="dt">';
      item.doses.forEach(function(d) { h += '<tr><td>' + d.route + '</td><td>' + d.dose + '</td></tr>'; });
      h += '</table></div>';
    }
    if (item.notes && item.notes.length) {
      h += '<div class="cs"><div class="cl">Clinical Notes</div>';
      item.notes.forEach(function(n) { h += '<div class="co i">&#x2139; ' + n + '</div>'; });
      h += '</div>';
    }
  } else {
    if (item.overview) h += '<div class="cs"><div class="cl">Overview</div><div class="ct">' + item.overview + '</div></div>';
    if (item.vitals && item.vitals.length) {
      h += '<div class="vs">';
      item.vitals.forEach(function(v) { h += '<div class="vc"><div class="vl">' + v.label + '</div><div class="vv">' + v.val + '</div></div>'; });
      h += '</div>';
    }
    if (item.steps && typeof item.steps[0] === 'string') {
      h += '<div class="cs"><div class="cl">Procedure Steps</div>';
      item.steps.forEach(function(s, i) { h += '<div class="step"><div class="sn">' + (i + 1) + '</div><div class="st">' + s + '</div></div>'; });
      h += '</div>';
    } else if (item.emt_steps || item.aemt_steps || item.pm_steps) {
      const emt = item.emt_steps || [], aemt = item.aemt_steps || [], pm = item.pm_steps || [];
      const maxR = Math.max(emt.length, aemt.length, pm.length);
      h += '<div class="cs"><div class="cl">Standing Orders</div>';
      h += '<table class="sot"><thead><tr><th class="lc">#</th><th class="ec">EMT</th><th class="ac">AEMT</th><th class="pc">PM</th></tr></thead><tbody>';
      for (let i = 0; i < maxR; i++) {
        h += '<tr><td class="lc">' + (i + 1) + '</td><td class="ec">' + (emt[i] || '') + '</td><td class="ac">' + (aemt[i] || '') + '</td><td class="pc">' + (pm[i] || '') + '</td></tr>';
      }
      h += '</tbody></table></div>';
    }
    if (item.monitoring && item.monitoring.length) {
      h += '<div class="cs"><div class="cl">Transport Monitoring</div>';
      item.monitoring.forEach(function(m) { h += '<div class="mon-item"><div class="mon-dot"></div><div>' + m + '</div></div>'; });
      h += '</div>';
    }
    if (item.diversion) {
      h += '<div class="cs"><div class="div-label">&#x26A1; DIVERSION TRIGGERS</div><div class="div-box">' + item.diversion + '</div></div>';
    }
    if (item.notes && item.notes.length) {
      h += '<div class="cs"><div class="cl">Critical Notes</div>';
      item.notes.forEach(function(n) { h += '<div class="co w">&#x26A0; ' + n + '</div>'; });
      h += '</div>';
    }
  }

  document.getElementById('dv-body').innerHTML = h;
  document.getElementById('dv').style.display = 'block';
  document.getElementById('dv').scrollTop = 0;
  history.pushState({detail: true}, '');
}

function closeDetail() {
  document.getElementById('dv').style.display = 'none';
  CURRENT = null;
}

function switchTab(tab) {
  TAB = tab;
  closeDetail();
  document.querySelectorAll('.nb').forEach(function(b) { b.classList.toggle('on', b.dataset.tab === tab); });
  if (tab === 'infusions') {
    TAB = tab;
    renderInfusions();
    return;
  }
  if (tab === 'ventilator') {
    var idx = D.procedures.findIndex(function(p) { return p.num === 'V-6'; });
    if (idx >= 0) openDetail('procedures', idx);
    return;
  }
  if (tab === 'diagnose') { dtHistory = []; }
  renderList();
}

function renderV6Detail() {
  document.getElementById('dv-num').textContent = 'V-6';
  document.getElementById('dv-title').textContent = 'LTV 1200 Ventilator Management';
  document.getElementById('dv-scope').innerHTML = '<span class="sbadge pm">PM ONLY</span>';
  document.getElementById('dv-fav').innerHTML = isFav('procedures:6') ? '&#x2605;' : '&#x2606;';

  var body = document.getElementById('dv-body');

  body.innerHTML = [
    '<div class="v6-tabs">',
    '  <div class="v6-tab on" data-pane="ibw">IBW &amp; Tidal Volume</div>',
    '  <div class="v6-tab" data-pane="trouble">Troubleshooting</div>',
    '  <div class="v6-tab" data-pane="setup">Setup Steps</div>',
    '  <div class="v6-tab" data-pane="alarms">Alarms</div>',
    '  <div class="v6-tab" data-pane="settings">Clinical Settings</div>',
    '</div>',

    // ── IBW PANE ──────────────────────────────────────────────────────────
    '<div class="v6-pane on" id="v6-ibw">',
    '  <div class="ibw-wrap">',
    '    <div class="ibw-title">&#x26A1; IBW &amp; Tidal Volume Calculator</div>',
    '    <div class="ibw-row">',
    '      <div class="ibw-label">Height</div>',
    '      <input class="ibw-input" type="number" id="v6-ht" placeholder="in" min="48" max="84">',
    '      <span class="ibw-unit">inches</span>',
    '      <input class="ibw-input" type="number" id="v6-cm" placeholder="cm" min="120" max="215" style="width:72px">',
    '      <span class="ibw-unit">cm</span>',
    '    </div>',
    '    <div class="ibw-row">',
    '      <div class="ibw-label">Sex</div>',
    '      <div class="ibw-gender" style="flex:1">',
    '        <button class="gender-btn on" id="v6-male">Male</button>',
    '        <button class="gender-btn" id="v6-female">Female</button>',
    '      </div>',
    '    </div>',
    '    <div id="v6-ibw-result"></div>',
    '  </div>',
    '  <div class="co i" style="margin-bottom:12px">&#x2139; Always use IBW for tidal volume &mdash; never actual body weight. Using actual weight in obese patients causes volutrauma.</div>',
    '  <div class="cs"><div class="cl">Formula Reference</div>',
    '  <div style="display:flex;flex-direction:column;gap:6px;font-size:12px;color:#cbd5e1">',
    '    <div><span style="color:var(--gray);font-family:var(--mono)">Male IBW &nbsp;&nbsp;&nbsp;</span> 50 + 2.3 &times; (height in inches &minus; 60)</div>',
    '    <div><span style="color:var(--gray);font-family:var(--mono)">Female IBW </span> 45.5 + 2.3 &times; (height in inches &minus; 60)</div>',
    '    <div><span style="color:var(--gray);font-family:var(--mono)">Target TV &nbsp;&nbsp;</span> 6&ndash;8 mL/kg IBW &nbsp;|&nbsp; ARDS/TBI: 6 mL/kg strict</div>',
    '  </div></div>',
    '</div>',

    // ── TROUBLESHOOTING PANE ──────────────────────────────────────────────
    '<div class="v6-pane" id="v6-trouble">',
    '  <div class="co d" style="margin-bottom:12px">&#x1F6A8; Any alarm you cannot immediately resolve: disconnect and BVM ventilate. Never delay oxygenation to troubleshoot.</div>',
    '  <div class="ts-list" id="v6-ts-list"></div>',
    '</div>',

    // ── SETUP STEPS PANE ─────────────────────────────────────────────────
    '<div class="v6-pane" id="v6-setup">',
    '  <div class="co i" style="margin-bottom:12px">&#x2139; Get verbal handoff from sending RT/RN: mode, TV, rate, FiO2, PEEP, insp time, last ABG if available.</div>',
    v6SetupStepsHTML(),
    '</div>',

    // ── ALARMS PANE ───────────────────────────────────────────────────────
    '<div class="v6-pane" id="v6-alarms">',
    v6AlarmsHTML(),
    '</div>',

    // ── CLINICAL SETTINGS PANE ────────────────────────────────────────────
    '<div class="v6-pane" id="v6-settings">',
    v6SettingsHTML(),
    '</div>',

  ].join('');

  // Wire up tabs
  body.querySelectorAll('.v6-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      body.querySelectorAll('.v6-tab').forEach(function(t) { t.classList.remove('on'); });
      body.querySelectorAll('.v6-pane').forEach(function(p) { p.classList.remove('on'); });
      tab.classList.add('on');
      var pane = document.getElementById('v6-' + tab.dataset.pane);
      if (pane) pane.classList.add('on');
    });
  });

  // Wire up IBW calculator
  function calcIBW() {
    var htIn = parseFloat(document.getElementById('v6-ht').value);
    var isMale = document.getElementById('v6-male').classList.contains('on');
    var result = document.getElementById('v6-ibw-result');
    if (!htIn || htIn < 48 || htIn > 84) { result.innerHTML = ''; return; }
    var ibw = isMale ? 50 + 2.3 * (htIn - 60) : 45.5 + 2.3 * (htIn - 60);
    if (ibw < 30) ibw = 30;
    var tv6 = Math.round(ibw * 6);
    var tv7 = Math.round(ibw * 7);
    var tv8 = Math.round(ibw * 8);
    result.innerHTML = [
      '<div class="ibw-result">',
      '  <div class="ibw-result-row"><span class="ibw-result-label">IBW</span><span class="ibw-result-val">' + ibw.toFixed(1) + ' kg</span></div>',

      '</div>',
    ].join('');
  }

  // Height in inches updates cm and vice versa
  document.getElementById('v6-ht').addEventListener('input', function() {
    var v = parseFloat(this.value);
    if (v) document.getElementById('v6-cm').value = Math.round(v * 2.54);
    calcIBW();
  });
  document.getElementById('v6-cm').addEventListener('input', function() {
    var v = parseFloat(this.value);
    if (v) document.getElementById('v6-ht').value = (v / 2.54).toFixed(1);
    calcIBW();
  });
  document.getElementById('v6-male').addEventListener('click', function() {
    this.classList.add('on');
    document.getElementById('v6-female').classList.remove('on');
    calcIBW();
  });
  document.getElementById('v6-female').addEventListener('click', function() {
    this.classList.add('on');
    document.getElementById('v6-male').classList.remove('on');
    calcIBW();
  });

  // Wire up troubleshooting accordion
  document.getElementById('v6-ts-list').innerHTML = v6TroubleHTML();
  document.getElementById('v6-ts-list').addEventListener('click', function(e) {
    var hdr = e.target.closest('.ts-problem-hdr');
    if (!hdr) return;
    var card = hdr.closest('.ts-problem');
    var wasOpen = card.classList.contains('open');
    document.querySelectorAll('.ts-problem').forEach(function(p) { p.classList.remove('open'); });
    if (!wasOpen) card.classList.add('open');
  });
}

    h += '<span class="dt-crumb-sep">›</span>';
    if (i < dtHistory.length - 1) {
      h += '<span class="dt-crumb" data-dt-goto="' + i + '">' + step.label + '</span>';
    } else {
      h += '<span class="dt-crumb current">' + step.label + '</span>';
    }
  });
  h += '</div>';

  // Question
  if (node.q) {
    h += '<div class="dt-question">';
    h += '<div class="dt-q-text">' + node.q + '</div>';
    if (node.sub) h += '<div class="dt-q-sub">' + node.sub + '</div>';
    h += '</div>';
    h += '<div class="dt-opts">';
    (node.opts || []).forEach(function(opt, i) {
      if (opt.next) {
        h += '<div class="dt-opt" data-dt-next="' + opt.next + '" data-dt-label="' + opt.label + '">';
      } else {
        h += '<div class="dt-opt" data-dt-result="' + i + '" data-dt-nodeid="' + nodeId + '">';
      }
      h += '<div class="dt-opt-icon">' + (opt.icon || '●') + '</div>';
      h += '<div class="dt-opt-label">' + opt.label + '</div>';
      h += '<div class="dt-opt-arr">›</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  h += '</div>';
  container.innerHTML = h;
}

function renderDiagResult(nodeId, optIdx) {
  const node = TREE[nodeId];
  if (!node) return;
  const opt = node.opts[optIdx];
  if (!opt || !opt.protos) return;

  const container = document.getElementById('lv');
  let h = '<div class="dt-wrap">';

  // Breadcrumb
  h += '<div class="dt-breadcrumb">';
  h += '<span class="dt-crumb" data-dt-goto="-1">Start</span>';
  dtHistory.forEach(function(step, i) {
    h += '<span class="dt-crumb-sep">›</span>';
    h += '<span class="dt-crumb" data-dt-goto="' + i + '">' + step.label + '</span>';
  });
  h += '<span class="dt-crumb-sep">›</span>';
  h += '<span class="dt-crumb current">' + opt.label + '</span>';
  h += '</div>';

  h += '<div class="dt-result">';

  // Summary
  if (opt.summary) {
    h += '<div class="dt-result-summary">' + opt.summary + '</div>';
  }

  // Protocol recommendations
  h += '<div class="dt-result-label">Recommended Protocols</div>';
  (opt.protos || []).forEach(function(proto) {
    if (!proto) return;
    const sectionColor = proto.section === 'IFT' ? 'var(--aemt)' : proto.section === '911' ? 'var(--emt)' : 'var(--pm)';
    h += '<div class="dt-proto-card" data-dt-proto-type="' + proto.type + '" data-dt-proto-idx="' + proto.idx + '">';
    h += '<div class="dt-proto-num">' + (proto.num || '') + '</div>';
    h += '<div class="dt-proto-title"><div>' + proto.title + '</div>';
    if (proto.note) h += '<div class="dt-proto-note">→ ' + proto.note + '</div>';
    h += '</div>';
    h += '<span class="sbadge" style="background:rgba(0,0,0,0.3);color:' + sectionColor + ';border-color:' + sectionColor + '">' + (proto.section || '') + '</span>';
    h += '</div>';
  });

  h += '<div class="dt-restart" data-dt-goto="-1">↺ Start Over</div>';
  h += '</div></div>';
  container.innerHTML = h;
}

// Event delegation for tree
document.getElementById('lv').addEventListener('click', function(e) {
  // Already handled by existing card delegation — extend it
  if (TAB !== 'diagnose') return;

  // Breadcrumb goto
  const crumb = e.target.closest('.dt-crumb[data-dt-goto]');
  if (crumb) {
    const idx = parseInt(crumb.dataset.dtGoto);
    if (idx === -1) { dtHistory = []; renderDiagTree(); }
    else { dtHistory = dtHistory.slice(0, idx + 1); renderDiagTree(); }
    return;
  }

  // Next node
  const nextOpt = e.target.closest('.dt-opt[data-dt-next]');
  if (nextOpt) {
    dtHistory.push({nodeId: nextOpt.dataset.dtNext, label: nextOpt.querySelector('.dt-opt-label').textContent});
    renderDiagTree();
    document.getElementById('main').scrollTop = 0;
    window.scrollTo(0, 0);
    return;
  }

  // Result leaf
  const resultOpt = e.target.closest('.dt-opt[data-dt-result]');
  if (resultOpt) {
    const label = resultOpt.querySelector('.dt-opt-label').textContent;
    dtHistory.push({nodeId: resultOpt.dataset.dtNodeid + '_result', label: label});
    renderDiagResult(resultOpt.dataset.dtNodeid, parseInt(resultOpt.dataset.dtResult));
    document.getElementById('main').scrollTop = 0;
    window.scrollTo(0, 0);
    return;
  }

  // Restart
  const restart = e.target.closest('.dt-restart');
  if (restart) {
    dtHistory = [];
    renderDiagTree();
    document.getElementById('main').scrollTop = 0;
    window.scrollTo(0, 0);
    return;
  }

  // Open protocol from result
  const protoCard = e.target.closest('.dt-proto-card[data-dt-proto-type]');
  if (protoCard) {
    openDetail(protoCard.dataset.dtProtoType, parseInt(protoCard.dataset.dtProtoIdx));
    return;
  }
});


// ── SECTION IV INFUSIONS ─────────────────────────────────────────────────
function renderInfusions() {
  document.querySelectorAll('.nb').forEach(function(b) { b.classList.toggle('on', b.dataset.tab === 'infusions'); });
  var c = document.getElementById('lv');
  var h = '<div class="sg">SECTION IV &mdash; HOSPITAL-SUPPLIED INFUSION MONITORING</div>';
  h += '<div style="padding:10px 14px 4px"><div class="co i" style="margin-bottom:0">&#x2139; Covers infusions initiated at the sending facility and continued during transport. Distinct from Section III formulary.</div></div>';

  D.section_iv.forEach(function(item, idx) {
    var scopeTag = '';
    if (item.scope === 'aemt') scopeTag = '<span class="sbadge aemt">AEMT+</span>';
    else if (item.scope === 'pm') scopeTag = '<span class="sbadge pm">PM ONLY</span>';
    else scopeTag = '<span class="sbadge all">ALL LEVELS</span>';
    h += '<div class="iv-card" data-ivtype="' + idx + '">';
    h += '<div class="iv-card-inner">';
    h += '<div class="iv-card-icon">' + item.icon + '</div>';
    h += '<div class="iv-card-text">';
    h += '<div class="iv-card-title">' + item.title + '</div>';
    if (item.infusions) h += '<div class="iv-card-sub">' + item.infusions.length + ' medications</div>';
    h += '</div>';
    h += scopeTag;
    h += '<div style="color:var(--gray);font-size:12px;margin-left:6px">&#x203A;</div>';
    h += '</div></div>';
  });

  c.innerHTML = h;
}

function renderInfusionDetail(idx) {
  var item = D.section_iv[idx];
  if (!item) return;

  document.getElementById('dv-num').textContent = 'Section IV';
  document.getElementById('dv-title').textContent = item.title;
  var scopeTag = item.scope === 'aemt' ? '<span class="sbadge aemt">AEMT+</span>' :
                 item.scope === 'pm'   ? '<span class="sbadge pm">PM ONLY</span>' :
                                          '<span class="sbadge all">ALL LEVELS</span>';
  document.getElementById('dv-scope').innerHTML = scopeTag;
  document.getElementById('dv-fav').innerHTML = '&#x2606;';

  var h = '';

  // Content sections (overview, verification)
  if (item.content) {
    item.content.forEach(function(sec) {
      h += '<div class="cs"><div class="cl">' + sec.label + '</div>';
      if (sec.text) h += '<div class="ct">' + sec.text + '</div>';
      if (sec.items) sec.items.forEach(function(it, i) {
        h += '<div class="step"><div class="sn">' + (i+1) + '</div><div class="st">' + it + '</div></div>';
      });
      h += '</div>';
    });
  }

  // Critical warning
  if (item.critical) {
    h += '<div class="iv-critical">&#x1F6A8; ' + item.critical + '</div>';
  }

  // Infusion table
  if (item.infusions && item.infusions.length) {
    h += '<div class="cs"><div class="cl">Medications &mdash; Transport Monitoring</div>';
    item.infusions.forEach(function(inf) {
      h += '<div class="inf-row">';
      h += '<div class="inf-name">' + inf.name + '</div>';
      h += '<div class="inf-note">' + inf.notes + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // AEMT responsibilities
  if (item.responsibilities) {
    h += '<div class="cs"><div class="cl">AEMT Monitoring Responsibilities</div>';
    item.responsibilities.forEach(function(r, i) {
      h += '<div class="step"><div class="sn">' + (i+1) + '</div><div class="st">' + r + '</div></div>';
    });
    h += '</div>';
  }

  // Transfusion reaction steps
  if (item.transfusion_reaction) {
    h += '<div class="cs"><div class="cl">Transfusion Reaction Response</div>';
    item.transfusion_reaction.forEach(function(s, i) {
      h += '<div class="tr-step"><div class="tr-num">' + (i+1) + '</div><div class="tr-text">' + s + '</div></div>';
    });
    h += '</div>';
  }

  // Diversion
  if (item.diversion) {
    h += '<div class="cs"><div class="iv-diversion-label">&#x26A1; DIVERSION TRIGGERS</div><div class="iv-diversion">' + item.diversion + '</div></div>';
  }

  document.getElementById('dv-body').innerHTML = h;
  document.getElementById('dv').style.display = 'block';
  document.getElementById('dv').scrollTop = 0;
  history.pushState({detail: true}, '');
}

// Event delegation for infusion cards
document.getElementById('lv').addEventListener('click', function(e) {
  var ivCard = e.target.closest('.iv-card');
  if (ivCard) {
    renderInfusionDetail(parseInt(ivCard.dataset.ivtype));
  }
}, true);

</script>
