    {id:8,cat:"Scope",type:"mc",q:"Which medication administration route is authorized at ALL levels in Linn County?",opts:["A. IV push","B. IO","C. Intramuscular (IM)","D. IV infusion"],ans:2,exp:"IM is All Levels. IV push and IO are AEMT+. IV infusion is PM only."},
    {id:9,cat:"Airway",type:"mc",q:"What oxygen flow rate is required for effective CPAP delivery in Linn County?",opts:["A. 6 L/min","B. 10 L/min","C. 15 L/min","D. 25 L/min"],ans:2,exp:"15 L/min O2 flow is required for effective CPAP pressure delivery per Linn County protocols."},
    {id:10,cat:"Airway",type:"mc",q:"CPAP is contraindicated in which of the following patients?",opts:["A. SpO2 88% with COPD","B. Pulmonary edema with SBP 120","C. SBP 78 mmHg with respiratory distress","D. Anxious but cooperative patient"],ans:2,exp:"Hypotension (SBP < 90 mmHg) contraindicates CPAP. Other contraindications: decreased mental status, inability to protect airway, active emesis, suspected pneumothorax."},
    {id:11,cat:"Airway",type:"tf",q:"True or False: Supplemental oxygen should be applied routinely to all patients regardless of SpO2.",opts:["True","False"],ans:1,exp:"False. Oxygen is titrated to clinical need. Target SpO2 >= 94% for most patients. Hyperoxia causes harm in post-ROSC patients."},
    {id:12,cat:"Cardiac",type:"mc",q:"Per Linn County protocols, what is the aspirin dose for suspected ACS?",opts:["A. 81 mg swallowed","B. 162 mg chewed","C. 324 mg chewed","D. 500 mg chewed"],ans:2,exp:"324 mg aspirin chewed (not swallowed whole). Chewing provides faster buccal absorption for time-sensitive ACS."},
    {id:13,cat:"Cardiac",type:"tf",q:"True or False: Aspirin should be chewed rather than swallowed whole for ACS.",opts:["True","False"],ans:0,exp:"True. Chewing aspirin provides faster buccal absorption. Swallowing whole delays therapeutic effect."},
    {id:14,cat:"Cardiac",type:"mc",q:"What is the target adult CPR compression rate per Linn County protocols?",opts:["A. 60-80/min","B. 80-100/min","C. 100-120/min","D. 120-140/min"],ans:2,exp:"100-120 compressions per minute with full chest recoil between compressions."},
    {id:15,cat:"Stroke",type:"mc",q:"What is the MOST critical piece of information for a suspected stroke patient?",opts:["A. Blood pressure on scene","B. Last known well (LKW) time","C. Blood glucose","D. SpO2"],ans:1,exp:"Last known well time determines tPA and thrombectomy eligibility. Document the exact time from the patient, family, or bystanders."},
    {id:16,cat:"Stroke",type:"mc",q:"The Cincinnati Stroke Screen is positive if:",opts:["A. All three findings are abnormal","B. Any single finding is abnormal","C. Two of three are abnormal","D. Only if facial droop is present"],ans:1,exp:"Any single abnormal finding (facial droop, arm drift, or speech abnormality) is a positive Cincinnati screen. Pre-alert the receiving facility immediately."},
    {id:17,cat:"Stroke",type:"tf",q:"True or False: An EMT should routinely lower blood pressure in a suspected stroke patient.",opts:["True","False"],ans:1,exp:"False. Do NOT routinely lower BP in ischemic stroke. Permissive hypertension maintains penumbra perfusion."},
    {id:18,cat:"Anaphylaxis",type:"mc",q:"What is the FIRST treatment for anaphylaxis with hypotension and throat tightness?",opts:["A. Diphenhydramine 50 mg IM","B. Epinephrine 0.3 mg IM to the lateral thigh","C. Normal saline 500 mL bolus","D. Albuterol nebulized"],ans:1,exp:"Epinephrine 1:1,000 IM to the lateral thigh is always first-line. Never delay for antihistamines or IV access."},
    {id:19,cat:"Anaphylaxis",type:"tf",q:"True or False: Diphenhydramine is the first-line treatment for anaphylaxis.",opts:["True","False"],ans:1,exp:"False. Epinephrine IM is always first-line. Diphenhydramine is an adjunct and must never replace or delay epinephrine."},
    {id:20,cat:"Hypoglycemia",type:"mc",q:"A conscious Linn County patient has a glucose of 48 mg/dL. As an EMT, what is your treatment?",opts:["A. Oral glucose if patient can protect airway and swallow","B. D10% IV","C. Contact DMO before treating","D. Oxygen and transport only"],ans:0,exp:"EMTs may administer oral glucose to a conscious patient who can protect their airway and swallow. D10% IV is AEMT+ scope."},
    {id:21,cat:"Trauma",type:"mc",q:"A tourniquet should be placed how far proximal to an extremity wound?",opts:["A. Directly over the wound","B. 1 inch proximal","C. 2-3 inches proximal","D. 6 inches proximal"],ans:2,exp:"2-3 inches proximal to the wound, not over a joint, per Linn County protocols."},
    {id:22,cat:"Trauma",type:"tf",q:"True or False: Tourniquet time should be marked prominently on the patient.",opts:["True","False"],ans:0,exp:"True. Mark time on the tourniquet AND on the patient (forehead). Ischemia time is critical for limb salvage decisions in the OR."},
    {id:23,cat:"Trauma",type:"mc",q:"What is the correct field action for a tourniquet once applied?",opts:["A. Remove once bleeding stops","B. Remove after 30 minutes","C. Remove if patient reports severe pain","D. Do not remove in the field"],ans:3,exp:"Never remove a tourniquet in the field once applied. Leave it for the surgical team. Tourniquet pain is expected -- provide analgesia per protocol."},
    {id:24,cat:"Trauma",type:"mc",q:"Using the Rule of Nines, what percentage of TBSA does one complete leg represent?",opts:["A. 9%","B. 13.5%","C. 18%","D. 4.5%"],ans:2,exp:"Each complete leg = 18% TBSA. Head/neck = 9%, each arm = 9%, anterior trunk = 18%, posterior trunk = 18%, genitalia = 1%. Only 2nd and 3rd degree burns count."},
    {id:25,cat:"Trauma",type:"tf",q:"True or False: First degree burns are included in TBSA calculation.",opts:["True","False"],ans:1,exp:"False. Only partial thickness (2nd degree) and full thickness (3rd degree) burns count. First degree burns are excluded."},
    {id:26,cat:"Spinal",type:"mc",q:"Which is an indication to apply SMR per Linn County protocols?",opts:["A. High-speed MVC mechanism alone","B. Midline neck or spine tenderness on palpation","C. Patient is ambulatory at scene","D. Patient age over 60"],ans:1,exp:"Midline neck or spine pain/tenderness on palpation is an indication for SMR. Mechanism alone does NOT determine need."},
    {id:27,cat:"Spinal",type:"tf",q:"True or False: SMR should NOT be applied for penetrating neck trauma.",opts:["True","False"],ans:0,exp:"True. SMR in penetrating neck trauma is associated with increased mortality. No collar, no board for penetrating neck injury."},
    {id:28,cat:"Pediatric",type:"mc",q:"What tool should be used for weight-based pediatric drug dosing?",opts:["A. Parent estimate of weight","B. Broselow length-based tape","C. Standard adult dosing halved","D. Age-based formula only"],ans:1,exp:"The Broselow tape is the standard for all pediatric weight-based dosing. If patient exceeds tape length, use adult dosing."},
    {id:29,cat:"Seizure",type:"tf",q:"True or False: Forcefully restraining a patient's limbs during a seizure prevents injury.",opts:["True","False"],ans:1,exp:"False. Never forcefully restrain extremities during a seizure -- this increases injury risk. Protect the patient from the environment."},
    {id:30,cat:"Cardiac",type:"mc",q:"Minimum EMS resuscitation time for an UNWITNESSED arrest before Linn County field TOR is:",opts:["A. 10 minutes","B. 20 minutes","C. 25 minutes","D. 40 minutes"],ans:2,exp:"Minimum 25 minutes for unwitnessed arrest. Witnessed arrest requires minimum 40 minutes. All other TOR criteria must also be met."},
    {id:31,cat:"Cardiac",type:"tf",q:"True or False: A hypothermic cardiac arrest patient meets TOR criteria if 25 minutes have passed without ROSC.",opts:["True","False"],ans:1,exp:"False. Hypothermia is a special circumstance -- resuscitate and transport regardless of TOR time criteria."},
    {id:32,cat:"Operations",type:"mc",q:"Who is the Medical Director for Linn County EMS?",opts:["A. Dr. Bryan Beaver","B. Dr. Jordan Davis","C. Dr. Ameet Deshmukh","D. The KBEMS State Medical Director"],ans:2,exp:"Dr. Ameet Deshmukh, MD is the Medical Director for Linn County EMS. All standing orders are issued under his authority."},
    {id:33,cat:"Operations",type:"tf",q:"True or False: Standing orders may be implemented without contacting DMO first when clinically indicated.",opts:["True","False"],ans:0,exp:"True. Standing orders are pre-authorized and may be implemented when clinically indicated, prior to DMO contact."},
    {id:34,cat:"Nausea",type:"mc",q:"Which antiemetic is authorized at All Levels in Linn County?",opts:["A. Ondansetron IV","B. Isopropyl alcohol inhaled","C. Promethazine IM","D. Metoclopramide IV"],ans:1,exp:"Isopropyl alcohol (prep pad inhaled) is All Levels. Ondansetron is AEMT and PM scope."},
    {id:35,cat:"Airway",type:"mc",q:"A patient rescued from an enclosed fire has SpO2 99% but AMS. What is the problem?",opts:["A. Sensor is on wrong finger","B. SpO2 is unreliable in CO poisoning -- reads falsely normal","C. AMS is unrelated to CO at this SpO2","D. SpO2 of 99% rules out CO toxicity"],ans:1,exp:"Pulse oximetry is UNRELIABLE in CO poisoning. Carboxyhemoglobin reads as oxyhemoglobin, giving falsely normal SpO2. Apply high-flow O2 via NRB regardless of SpO2."},
    {id:36,cat:"Obstetrics",type:"mc",q:"After what gestational age should a patient be transported left lateral or with left uterine displacement?",opts:["A. After 12 weeks","B. After 16 weeks","C. After 20 weeks","D. Only during active labor"],ans:2,exp:"After 20 weeks gestation, left lateral decubitus or manual left uterine displacement is required to relieve aortocaval compression."},
    {id:37,cat:"Obstetrics",type:"tf",q:"True or False: Fundal pressure should be applied during shoulder dystocia.",opts:["True","False"],ans:1,exp:"False. NEVER apply fundal pressure during shoulder dystocia -- it worsens impaction. Use McRoberts maneuver and suprapubic pressure only."},
    {id:38,cat:"Pediatric",type:"mc",q:"A BRUE patient who appears fully recovered should:",opts:["A. Be discharged if parents are comfortable","B. Be transported to the ED","C. Be monitored on scene 30 minutes then reassessed","D. Only transported if SpO2 is abnormal"],ans:1,exp:"All BRUE patients must be transported. BRUE may signal a cardiac arrhythmia, airway anomaly, or non-accidental trauma."},
    {id:39,cat:"Airway",type:"mc",q:"Which is a contraindication to NPA insertion per Linn County protocols?",opts:["A. Intact gag reflex","B. Unconscious patient","C. Significant facial injury or suspected basilar skull fracture","D. Dentures in place"],ans:2,exp:"NPA should NOT be used with significant facial injury or suspected basilar skull fracture unless it is the only means of airway protection available."},
    {id:40,cat:"Trauma",type:"mc",q:"For a patient with an open chest wound, the immediate intervention is:",opts:["A. Positive pressure ventilation only","B. Apply a semi-occlusive chest seal immediately","C. Needle decompression","D. Tight occlusive dressing all four sides"],ans:1,exp:"Apply a semi-occlusive chest seal immediately. A fully occlusive dressing risks tension pneumothorax. Needle decompression is for tension PTX, not open chest wound alone."},
    {id:41,cat:"Scope",type:"mc",q:"Which assessment skill is authorized at the EMT level in Linn County?",opts:["A. 12-lead EKG interpretation","B. 12-lead EKG acquisition","C. Limb lead interpretation","D. Manual defibrillation"],ans:1,exp:"12-lead EKG acquisition is All Levels. 12-lead interpretation is PM only. Limb lead interpretation is AEMT+. Manual defibrillation is AEMT+."},
    {id:42,cat:"Pediatric",type:"mc",q:"A croup patient received epinephrine and appears improved. What is required?",opts:["A. On-scene discharge if symptoms resolved","B. Transport to hospital -- effect is transient and rebound stridor can occur","C. Repeat dose every 20 minutes for 3 doses then reassess","D. Albuterol follow-up then reassess"],ans:1,exp:"All patients who receive epinephrine for croup must be transported regardless of response. Effect is transient and rebound stridor can occur."},
    {id:43,cat:"Cardiac",type:"tf",q:"True or False: Drowning and lightning strike patients should receive full resuscitation regardless of standard TOR criteria.",opts:["True","False"],ans:0,exp:"True. Drowning, lightning/electrocution, and hypothermia are special circumstances requiring resuscitation and transport regardless of TOR time criteria."},
    {id:44,cat:"Anaphylaxis",type:"mc",q:"After epinephrine, which fluid is appropriate for persistent anaphylactic hypotension?",opts:["A. No fluids -- epi alone is sufficient","B. Normal saline 500 mL IV/IO bolus, repeat as needed","C. D10W 250 mL IV","D. Hypertonic saline 3%"],ans:1,exp:"Normal saline 500 mL IV/IO bolus, repeat as needed for anaphylactic hypotension. Pediatric: 20 mL/kg bolus."},
    {id:45,cat:"Trauma",type:"mc",q:"An amputation patient should be transported to which hospital for replantation in Kansas?",opts:["A. Nearest trauma center","B. St. Luke's Hospital KC","C. KU Medical Center","D. Overland Park Regional"],ans:2,exp:"KU Medical Center is the only Kansas regional center performing peripheral amputation replantation."},
    {id:46,cat:"Scope",type:"mc",q:"Which procedure is authorized at All Levels in Linn County?",opts:["A. Needle chest decompression","B. Wound packing","C. IO access","D. External jugular IV"],ans:1,exp:"Wound packing is All Levels. Needle decompression is PM only. IO access is AEMT+. External jugular IV is PM only."},
    {id:47,cat:"Airway",type:"tf",q:"True or False: BVM ventilation with a PEEP valve is within EMT scope in Linn County.",opts:["True","False"],ans:0,exp:"True. BVM with PEEP valve is All Levels per Linn County scope of practice."},
    {id:48,cat:"Spinal",type:"mc",q:"Per Linn County protocols, should patients be routinely transported on rigid long spine boards?",opts:["A. Yes -- all trauma patients","B. Yes -- all patients with SMR applied","C. No -- remove as soon as practical after extrication","D. Only if transport time exceeds 15 minutes"],ans:2,exp:"Do NOT transport routinely on rigid long boards. Remove as soon as clinically possible. Prolonged board immobilization causes pressure injuries and significant discomfort."},
    {id:49,cat:"Operations",type:"mc",q:"Per Linn County protocols, lights and sirens should be used:",opts:["A. On all calls as standard practice","B. Only when the patient requests them","C. When clinically justified -- not as routine practice","D. Whenever transport exceeds 20 minutes"],ans:2,exp:"Routine L&S use is NOT warranted and unnecessarily jeopardizes the patient, providers, and public. L&S requires clinical justification."},
    {id:50,cat:"Cardiac",type:"mc",q:"Which TOR criterion applies specifically to witnessed cardiac arrest in Linn County?",opts:["A. Minimum 25 minutes EMS resuscitation","B. Minimum 40 minutes EMS resuscitation","C. Minimum 20 minutes EMS resuscitation","D. Minimum 30 minutes EMS resuscitation"],ans:1,exp:"Witnessed arrest: minimum 40 minutes EMS resuscitation before field TOR. Unwitnessed: minimum 25 minutes. All other criteria must also be met."}
  ],
  aemt: [
    {id:1,cat:"Scope",type:"mc",q:"Which of the following is within AEMT scope in Linn County under standing orders?",opts:["A. Transcutaneous pacing","B. Synchronized cardioversion","C. Manual defibrillation","D. Endotracheal intubation"],ans:2,exp:"Manual defibrillation is AEMT and PM scope. Transcutaneous pacing and synchronized cardioversion are PM only. ETT intubation is PM only."},
    {id:2,cat:"Scope",type:"tf",q:"True or False: An AEMT in Linn County may access a pre-existing central line for medication administration.",opts:["True","False"],ans:1,exp:"False. Pre-existing central line access is PM only. AEMTs are authorized for peripheral IV and IO access."},
    {id:3,cat:"Scope",type:"mc",q:"An AEMT finds a patient with a running vasopressor infusion. The correct action is:",opts:["A. Monitor it -- it is like any other infusion","B. Contact dispatch -- vasopressor management is outside AEMT scope","C. Stop infusion and substitute NS","D. Continue if DMO is available by phone"],ans:1,exp:"Vasopressor infusion management is PM only. Contact dispatch before departure and request Paramedic reassignment."},
    {id:4,cat:"Medications",type:"mc",q:"What is the correct IV dextrose formulation carried in Linn County?",opts:["A. D5W","B. D10% (Dextrose 10%)","C. D50W","D. D25W"],ans:1,exp:"D10% is the formulary agent for IV hypoglycemia treatment. Max adult: 25 g (250 mL) titrated, up to 50 g total."},
    {id:5,cat:"Medications",type:"mc",q:"For an adult hypoglycemic patient with no IV access, what is the AEMT option?",opts:["A. Oral glucose only","B. D10% IO","C. Glucagon IM","D. Wait for PM"],ans:1,exp:"IO is AEMT scope in Linn County. D10% may be given IO if IV cannot be established. Glucagon is not in the Linn County AEMT formulary."},
    {id:6,cat:"Medications",type:"mc",q:"Ondansetron dosing for an adult Linn County patient is:",opts:["A. 8 mg IV, may repeat x2","B. 4 mg IV/IO/IM or ODT -- one dose only","C. 2 mg IV titrated","D. 4 mg IV, repeat every 15 min"],ans:1,exp:"Ondansetron 4 mg IV/IO/IM or ODT -- one dose only. Not indicated under age 2."},
    {id:7,cat:"Medications",type:"mc",q:"An AEMT may administer midazolam in Linn County for which indication?",opts:["A. Sedation for cardioversion","B. Behavioral agitation","C. Active seizures -- IM route","D. Post-intubation sedation"],ans:2,exp:"AEMT midazolam scope in Linn County is limited to active seizures, IM route. All other indications are PM only."},
    {id:8,cat:"Medications",type:"mc",q:"Adult midazolam dose for an active seizure when IV is unavailable:",opts:["A. 5 mg IM","B. 10 mg IM","C. 2.5 mg IM","D. 20 mg IM"],ans:1,exp:"10 mg IM for active seizure when IV/IO unavailable. May repeat at 5 mg every 5 min IM or IN (max 20 mg total)."},
    {id:9,cat:"Vascular",type:"mc",q:"IO access in Linn County is indicated for:",opts:["A. All patients who need IV access","B. Unstable patients or cardiac arrest when IV is not immediately available","C. Cardiac arrest patients only","D. Pediatric patients only"],ans:1,exp:"IO for unstable patients or cardiac arrest when IV cannot be quickly established. Sites: humeral head, proximal tibia, distal tibia."},
    {id:10,cat:"Vascular",type:"tf",q:"True or False: Lidocaine should be administered IO before fluid administration to reduce pain.",opts:["True","False"],ans:0,exp:"True. IO site analgesia with lidocaine: 40 mg IO slow push, 10 mL NS fast push, 20 mg IO slow push (adult). Conscious patients experience significant IO pain without this."},
    {id:11,cat:"Medications",type:"mc",q:"Nitroglycerin in Linn County is authorized for which scope levels?",opts:["A. All levels","B. EMT and AEMT only","C. AEMT and PM","D. PM only"],ans:2,exp:"Nitroglycerin is AEMT and PM scope. Dose: 0.4 mg SL every 5 min. Contraindicated with PDE5 inhibitors within 48 hr, SBP < 100, and post-ROSC."},
    {id:12,cat:"Medications",type:"mc",q:"An AEMT patient with pulmonary edema has SBP 88 mmHg. Should nitroglycerin be given?",opts:["A. Yes -- it reduces preload","B. No -- SBP <100 is a contraindication","C. Yes -- half dose only","D. Yes -- if ETCO2 is normal"],ans:1,exp:"SBP < 100 is a contraindication to nitroglycerin. Giving NTG to a hypotensive patient causes severe refractory hypotension."},
    {id:13,cat:"Cardiac",type:"mc",q:"Manual defibrillation energy for adult VF/pVT in Linn County:",opts:["A. 100 J","B. 150 J","C. 200 J biphasic","D. 360 J monophasic"],ans:2,exp:"200 J biphasic for adult VF/pVT. Resume CPR immediately after each shock."},
    {id:14,cat:"Cardiac",type:"mc",q:"Which antiarrhythmics are within AEMT scope for cardiac arrest in Linn County?",opts:["A. Adenosine only","B. Amiodarone and lidocaine for cardiac arrest","C. Amiodarone only","D. No antiarrhythmics -- PM only"],ans:1,exp:"Both amiodarone and lidocaine for cardiac arrest are AEMT scope. Use only ONE -- do not combine them."},
    {id:15,cat:"Medications",type:"mc",q:"Adult amiodarone dose for cardiac arrest in Linn County:",opts:["A. 150 mg IV/IO","B. 300 mg IV/IO -- repeat 150 mg x1","C. 5 mg/kg IV/IO","D. 200 mg IV/IO"],ans:1,exp:"Adult cardiac arrest amiodarone: 300 mg IV/IO fixed dose, repeat 150 mg x1 if needed. Pediatric: 5 mg/kg IV/IO."},
    {id:16,cat:"Cardiac",type:"mc",q:"Post-ROSC SpO2 target in Linn County is:",opts:["A. 88-92%","B. 94-98%","C. 100%","D. >90% any value"],ans:1,exp:"Post-ROSC SpO2: 94-98%. Do NOT target 100% -- hyperoxia causes reperfusion injury and worsens neurologic outcomes."},
    {id:17,cat:"Cardiac",type:"tf",q:"True or False: Post-ROSC hyperventilation improves neurological outcomes.",opts:["True","False"],ans:1,exp:"False. Hyperventilation post-ROSC causes cerebral vasoconstriction. Target ETCO2 35-45 mmHg (normocarbia)."},
    {id:18,cat:"Cardiac",type:"mc",q:"Initial defibrillation dose for pediatric VF in Linn County:",opts:["A. 200 J","B. 1 J/kg","C. 2 J/kg escalating to 4 J/kg","D. 50 J"],ans:2,exp:"2 J/kg for first pediatric shock, escalating to 4 J/kg for subsequent shocks. Adult energy is NOT used for pediatric patients."},
    {id:19,cat:"Medications",type:"mc",q:"Albuterol for suspected hyperkalemia in Linn County is dosed as:",opts:["A. 2.5 mg/3 mL NS x1","B. 2.5 mg/3 mL NS continuously -- max 8 doses adult","C. 5 mg/3 mL NS x1","D. 4 puffs MDI"],ans:1,exp:"Hyperkalemia: 2.5 mg/3 mL NS continuously, max 8 doses (20 mg) adult, 4 doses (10 mg) pediatric. Shifts potassium intracellularly."},
    {id:20,cat:"Vascular",type:"tf",q:"True or False: Any medication approved for IV may also be given IO in Linn County.",opts:["True","False"],ans:0,exp:"True. Any IV-approved medication may also be given via IO per Linn County Medication Administration guidelines."},
    {id:21,cat:"Medications",type:"mc",q:"Oral glucose options in Linn County for a conscious hypoglycemic patient include:",opts:["A. Only commercial Instaglucose tubes","B. Instaglucose, cake frosting, candy, table sugar, honey, or non-diet soda","C. D10W oral suspension","D. Fruit juice only"],ans:1,exp:"Oral glucose options: one tube of Instaglucose, cake frosting, or equivalent (candy, table sugar, honey, non-diet soda). Patient must be conscious and able to protect airway and swallow."},
    {id:22,cat:"Medications",type:"mc",q:"Ipratropium is contraindicated in which Linn County pediatric patient?",opts:["A. Any child under 12 years","B. Children under 2 years with bronchiolitis","C. Children with asthma","D. Any patient under 5 years"],ans:1,exp:"Ipratropium should NOT be administered to children under 2 years with bronchiolitis. It is acceptable for bronchospasm in other pediatric patients combined with albuterol."},
    {id:23,cat:"Cardiac",type:"mc",q:"Normal saline fluid resuscitation for adult shock in Linn County is:",opts:["A. 1 L wide open","B. 250-500 mL IV/IO bolus -- reassess after each","C. 30 mL/kg in one bolus","D. 100 mL/hr maintenance"],ans:1,exp:"Normal saline 250-500 mL IV/IO bolus, reassess and repeat for clinical response. Permissive hypotension acceptable in penetrating trauma without head injury."},
    {id:24,cat:"Medications",type:"mc",q:"Calcium chloride requires DMO in Linn County for which situation?",opts:["A. Cardiac arrest with suspected hyperkalemia","B. All situations","C. Non-arrest use and repeat dosing","D. Pediatric patients only"],ans:2,exp:"First dose in cardiac arrest: no DMO required. DMO required for repeat dosing and all non-arrest use."},
    {id:25,cat:"Trauma",type:"mc",q:"For a junctional wound not amenable to tourniquet, the correct Linn County intervention is:",opts:["A. Improvised tourniquet as high as possible","B. Pack tightly with hemostatic gauze and direct pressure","C. Arterial pressure point only","D. Pneumatic antishock garment"],ans:1,exp:"Junctional wounds: pack tightly with hemostatic gauze and maintain direct pressure. Plain gauze is effective if hemostatic gauze unavailable."},
    {id:26,cat:"Vascular",type:"mc",q:"Which vascular access site is NOT within AEMT scope in Linn County?",opts:["A. Peripheral IV","B. IO humeral head","C. External jugular vein","D. Peripheral IV at forearm"],ans:2,exp:"External jugular IV is PM only. AEMTs are authorized for peripheral IV and IO (humeral head, proximal tibia, distal tibia)."},
    {id:27,cat:"Medications",type:"mc",q:"An AEMT responds to opioid overdose. The patient is apneic. After BVM, what is next?",opts:["A. Contact DMO before naloxone","B. Administer naloxone -- titrate to adequate respirations","C. Maximum dose naloxone for full reversal","D. Transport only -- naloxone is PM scope"],ans:1,exp:"Administer naloxone titrated to adequate respiratory effort -- not full consciousness. AEMT scope includes naloxone via IV/IO/IM/IN."},
    {id:28,cat:"Medications",type:"mc",q:"Isopropyl alcohol antiemetic in Linn County is administered by:",opts:["A. 1 mL PO in water","B. Holding prep pad 1-2 cm below nares -- patient inhales deeply","C. Applying to nasal mucosa with swab","D. IV infusion 1%"],ans:1,exp:"Hold prep pad 1-2 cm below nares. Patient must understand and self-administer. Contraindicated in pregnancy."},
    {id:29,cat:"Pediatric",type:"mc",q:"A 20 kg child in cardiac arrest. Correct epinephrine dose:",opts:["A. 1 mg IV/IO","B. 0.2 mg IV/IO","C. 0.5 mg IV/IO","D. 0.1 mg IV/IO"],ans:1,exp:"Pediatric arrest epi: 0.01 mg/kg IV/IO. 20 kg x 0.01 = 0.2 mg. Max 1 mg per dose. Repeat every 3-5 min."},
    {id:30,cat:"Cardiac",type:"mc",q:"Minimum EMS resuscitation time for a WITNESSED arrest before Linn County field TOR:",opts:["A. 20 minutes","B. 25 minutes","C. 30 minutes","D. 40 minutes"],ans:3,exp:"Witnessed arrest: minimum 40 minutes. Unwitnessed: minimum 25 minutes. All other criteria must also be met."},
    {id:31,cat:"Medications",type:"mc",q:"Pre-existing central line access in Linn County requires withdrawal of how much blood before use?",opts:["A. 1 mL","B. 3 mL","C. 5 mL","D. 10 mL"],ans:2,exp:"Withdraw 5 mL from any port PRIOR to use to clear heparin lock before administering medications through a pre-existing central line. PM scope only."},
    {id:32,cat:"Medications",type:"mc",q:"Obstetric active seizure treatment within AEMT scope in Linn County:",opts:["A. Magnesium sulfate 4 g infusion","B. Midazolam 10 mg IM or 5 mg IV for active seizure","C. Magnesium sulfate 2 g IV push","D. Diazepam 10 mg IV"],ans:1,exp:"AEMT scope covers midazolam for active seizures per the standard seizure protocol. Magnesium sulfate is PM scope (extended formulary)."}
  ],
  pm: [
    {id:1,cat:"Pharmacology",type:"mc",q:"Correct first dose of adenosine for stable SVT in Linn County:",opts:["A. 12 mg slow IV push over 2 minutes","B. 6 mg rapid IV push with immediate flush","C. 6 mg IM to lateral thigh","D. 0.1 mg/kg IV over 5 minutes"],ans:1,exp:"Adenosine 6 mg rapid IV push followed immediately by flush. Must be given as proximal as possible. Half-life approximately 10 seconds. Warn patient of transient asystole."},
    {id:2,cat:"Pharmacology",type:"mc",q:"Correct amiodarone dose for adult cardiac arrest after failed defibrillation:",opts:["A. 150 mg IV over 10 minutes","B. Weight-based 5 mg/kg","C. 300 mg fixed dose IV/IO push","D. 200 mg IV/IO push"],ans:2,exp:"Adult cardiac arrest amiodarone: 300 mg fixed dose IV/IO push. Do NOT calculate weight-based for adults. Repeat dose: 150 mg x1."},
    {id:3,cat:"MAI",type:"mc",q:"Correct induction agent and dose for Linn County MAI:",opts:["A. Midazolam 5 mg IV","B. Ketamine 1-1.5 mg/kg IV over 1 minute","C. Fentanyl 100 mcg IV","D. Propofol 1.5 mg/kg IV"],ans:1,exp:"Ketamine 1-1.5 mg/kg IV over 1 minute is the Linn County MAI induction agent. Wait 60 seconds for onset. Signs: nystagmus, jaw relaxation."},
    {id:4,cat:"MAI",type:"mc",q:"Standard paralytic agent for MAI in Linn County:",opts:["A. Succinylcholine 1.5 mg/kg","B. Vecuronium 0.1 mg/kg IV","C. Rocuronium 0.5 mg/kg IV","D. Cisatracurium 0.1 mg/kg"],ans:1,exp:"Vecuronium 0.1 mg/kg IV slow push over 30-60 seconds is the standard Linn County MAI paralytic. Rocuronium is an extended formulary alternative."},
    {id:5,cat:"MAI",type:"tf",q:"True or False: A paralyzed patient is fully awake and aware without sedation.",opts:["True","False"],ans:0,exp:"True. NMBAs cause complete respiratory paralysis with NO analgesic or sedative properties. Sedation/analgesia MUST be given before the paralytic."},
    {id:6,cat:"MAI",type:"mc",q:"Post-intubation sedation agent and dose in Linn County:",opts:["A. Fentanyl 2 mcg/kg IV","B. Midazolam 2.5-5 mg IV every 10-30 min","C. Ketamine infusion 0.1 mg/kg/min","D. Propofol 50 mcg/kg/min"],ans:1,exp:"Midazolam 2.5-5 mg IV/IO every 10-30 min as needed. Do not allow the paralytic to outlast sedation."},
    {id:7,cat:"MAI",type:"mc",q:"Gold standard for confirming ETT placement in Linn County:",opts:["A. Colorimetric CO2 detector","B. Auscultation of bilateral breath sounds","C. Waveform capnography -- minimum 6 consecutive waveforms","D. Chest rise symmetry"],ans:2,exp:"Waveform capnography is the gold standard. Must see >= 6 consecutive waveforms. Colorimetric CO2 is unreliable in low-perfusion states."},
    {id:8,cat:"MAI",type:"mc",q:"Post-intubation ventilation targets in Linn County:",opts:["A. Rate 16-20, SpO2 100%, ETCO2 25-30","B. Rate 10-12, SpO2 94-98%, ETCO2 35-45","C. Rate 8-10, SpO2 90-94%, ETCO2 40-50","D. Rate 12-14, SpO2 96-100%, ETCO2 30-35"],ans:1,exp:"Rate 10-12/min adult, SpO2 94-98%, ETCO2 35-45 mmHg. Avoid hyperoxia and hypocarbia -- both worsen outcomes."},
    {id:9,cat:"MAI",type:"mc",q:"Maximum laryngoscopy attempts before moving to supraglottic airway in Linn County:",opts:["A. 1","B. 2","C. 3","D. 4"],ans:1,exp:"Maximum 2 laryngoscopy attempts before King LT/SGA. The paralyzed patient cannot breathe independently -- you must secure an airway."},
    {id:10,cat:"MAI",type:"tf",q:"True or False: Cricoid pressure should always be applied during MAI in Linn County.",opts:["True","False"],ans:1,exp:"False. Cricoid pressure is optional -- applied if aspiration risk is high and a third provider is available. Release immediately if it impairs laryngoscopy view."},
    {id:11,cat:"Pharmacology",type:"mc",q:"Ketamine is contraindicated in which patient under Linn County standing orders?",opts:["A. Trauma with hypotension","B. Active psychosis","C. Pediatric pain management","D. Hypertension"],ans:1,exp:"Active psychosis is a hard contraindication to ketamine. Also contraindicated: ACS, CVA. Prefer fentanyl in 3rd trimester pregnancy."},
    {id:12,cat:"Pharmacology",type:"mc",q:"Standard norepinephrine admixture for post-ROSC hypotension in Linn County:",opts:["A. 4 mg in 250 mL NS = 16 mcg/mL","B. 4 mg in 500 mL NS = 8 mcg/mL","C. 8 mg in 500 mL NS = 16 mcg/mL","D. 2 mg in 250 mL NS = 8 mcg/mL"],ans:1,exp:"Standard admixture: 4 mg in 500 mL NS = 8 mcg/mL. Starting rate for 80 kg adult approximately 75 mL/hr. Titrate to MAP > 65 mmHg."},
    {id:13,cat:"Pharmacology",type:"mc",q:"TCA overdose with QRS > 100 ms -- Linn County treatment:",opts:["A. Amiodarone 150 mg IV","B. Magnesium sulfate 2 g IV","C. Sodium bicarbonate 1 mEq/kg IV","D. Lidocaine 1.5 mg/kg IV"],ans:2,exp:"Sodium bicarbonate 1 mEq/kg IV for TCA with QRS > 100 ms. Alkalinization reverses sodium channel blockade. DMO required for non-arrest or repeat dosing."},
    {id:14,cat:"Pharmacology",type:"mc",q:"Adult midazolam dose for active seizure with IV access in Linn County:",opts:["A. 2.5 mg IV","B. 5 mg IV -- repeat 5 mg every 5 min (max 20 mg)","C. 10 mg IV bolus","D. 0.1 mg/kg IV"],ans:1,exp:"Active seizure with IV: 5 mg IV, repeat at 5 mg every 5 min, max 20 mg. Without IV: 10 mg IM. Also 0.2 mg/kg IN."},
    {id:15,cat:"Pharmacology",type:"mc",q:"Naloxone should be titrated to which endpoint in Linn County?",opts:["A. Full consciousness and alertness","B. Adequate respiratory effort -- not full reversal","C. SpO2 >= 98%","D. Patient can verbalize pain score"],ans:1,exp:"Titrate to adequate respiratory effort -- NOT full consciousness. Full reversal in opioid-tolerant patients causes acute withdrawal."},
    {id:16,cat:"Pharmacology",type:"mc",q:"Ketorolac (Toradol) NEW 2025 -- which patient should NOT receive it?",opts:["A. Musculoskeletal back pain, SBP 130","B. Renal colic, SBP 118","C. Fracture pain, SBP 78 mmHg","D. Hip pain, no NSAID allergy"],ans:2,exp:"Ketorolac is contraindicated in hypotension and hemodynamic instability. Also contraindicated: active GI bleeding, NSAID allergy, coagulopathy, significant renal impairment, 3rd trimester pregnancy."},
    {id:17,cat:"Pharmacology",type:"mc",q:"Adult ketorolac IV dose in Linn County:",opts:["A. 60 mg IV push","B. 15-30 mg IV slow push over 1-2 minutes","C. 30 mg IV infused over 30 minutes","D. 10 mg IV, may repeat x2"],ans:1,exp:"Ketorolac adult IV/IO: 15-30 mg slow push over 1-2 min. Adult IM: 30 mg. Pediatric (>= 2 yr): 0.5 mg/kg (max 15 mg). Single prehospital dose only."},
    {id:18,cat:"Cardiac",type:"mc",q:"Inferior STEMI patient is hypotensive. You are considering nitroglycerin. Correct action:",opts:["A. Give NTG 0.4 mg SL -- BP is still measurable","B. Hold NTG, suspect RV infarction, give IV fluids","C. Give NTG and start norepinephrine simultaneously","D. Double the NTG dose"],ans:1,exp:"Inferior STEMI = high suspicion for RV infarction. NTG causes severe hypotension by reducing RV preload. Hold NTG, get right-sided leads, give IV fluids."},
    {id:19,cat:"Cardiac",type:"mc",q:"First-line vasopressor for post-ROSC hypotension in Linn County:",opts:["A. Dopamine","B. Vasopressin","C. Norepinephrine","D. Epinephrine IM"],ans:2,exp:"Norepinephrine is first-line for post-ROSC hypotension and shock. Target MAP > 65 mmHg. Dopamine is not in the Linn County formulary."},
    {id:20,cat:"Cardiac",type:"mc",q:"ETCO2 target for TBI patient during routine transport in Linn County:",opts:["A. 25-30 mmHg","B. 30-35 mmHg","C. 35-45 mmHg","D. 45-50 mmHg"],ans:2,exp:"35-45 mmHg (normocapnia) for routine TBI transport. Controlled hyperventilation to 30-35 is ONLY for active herniation signs. Never drop below 30 mmHg."},
    {id:21,cat:"Cardiac",type:"tf",q:"True or False: Nitroglycerin may be administered post-ROSC for hemodynamic support.",opts:["True","False"],ans:1,exp:"False. Nitroglycerin is NEVER administered after ROSC -- hard contraindication per Linn County protocols."},
    {id:22,cat:"Pharmacology",type:"mc",q:"Norepinephrine is a vesicant. What precaution is required?",opts:["A. Premedicate with diphenhydramine","B. Extravasation causes severe tissue necrosis -- confirm IV patency and monitor continuously","C. Must be filtered before infusion","D. Only safe in central lines"],ans:1,exp:"Vesicant = severe tissue necrosis with extravasation. Use largest most proximal vein. Confirm patency with aspiration and flush. Monitor continuously."},
    {id:23,cat:"Pharmacology",type:"mc",q:"Magnesium sulfate for eclamptic seizures in Linn County:",opts:["A. 2 g IV push","B. 4 g in 50 mL D5W -- rapid infusion at 2 gtts/sec","C. 6 g IV over 30 minutes","D. 1 g IM"],ans:1,exp:"Eclampsia: 4 g in 50 mL D5W, macro drip at 2 gtts/sec. May repeat once at 2 g. Calcium chloride must be immediately available as antidote. Extended formulary."},
    {id:24,cat:"Pharmacology",type:"mc",q:"Signs of magnesium toxicity include all EXCEPT:",opts:["A. Loss of deep tendon reflexes","B. Respiratory depression","C. Hypertension","D. Circulatory collapse"],ans:2,exp:"Magnesium toxicity causes hypotension (NOT hypertension), flushing, sweating, loss of DTRs, paralysis, hypothermia, cardiovascular depression."},
    {id:25,cat:"Pharmacology",type:"mc",q:"Calcium chloride must NOT be pushed through the same line as which drug without flushing?",opts:["A. Normal saline","B. Sodium bicarbonate","C. Midazolam","D. Epinephrine"],ans:1,exp:"Calcium chloride + sodium bicarbonate without flushing causes precipitation. Always flush thoroughly between these agents."},
    {id:26,cat:"Pharmacology",type:"mc",q:"Crush injury with peaked T-waves and widened QRS -- FIRST treatment in Linn County:",opts:["A. Sodium bicarbonate 1 mEq/kg","B. Albuterol nebulized","C. Calcium chloride 1 g IV to stabilize myocardium","D. Lidocaine 1.5 mg/kg IV"],ans:2,exp:"Calcium chloride first for hyperkalemia with cardiac membrane instability. Stabilizes the myocardial membrane immediately without lowering potassium. Then albuterol and bicarb as adjuncts."},
    {id:27,cat:"Pharmacology",type:"mc",q:"Vecuronium duration of action at MAI doses in Linn County:",opts:["A. 5-10 minutes","B. 10-20 minutes","C. 30-60 minutes","D. 60-120 minutes"],ans:2,exp:"Vecuronium duration: 30-60 minutes. Ensure ongoing midazolam sedation throughout. Patient cannot breathe or signal distress."},
    {id:28,cat:"Pharmacology",type:"mc",q:"Correct lidocaine IO analgesia sequence in Linn County:",opts:["A. 20 mg IO push only","B. 40 mg IO slow push, 10 mL NS fast, 20 mg IO slow push","C. 1 mg/kg IO over 2 minutes","D. 100 mg IO drip over 10 minutes"],ans:1,exp:"IO site analgesia: 40 mg slow push, 10 mL NS fast, 20 mg slow push. Pediatric: 0.5 mg/kg (max 40 mg), 5 mL NS, 0.25 mg/kg."},
    {id:29,cat:"Medical",type:"mc",q:"Dialysis patient with peaked T-waves, QRS 160 ms. After calcium chloride, what is the next adjunct?",opts:["A. Amiodarone 300 mg IV","B. Albuterol 2.5 mg nebulized continuously to shift K+ intracellularly","C. Defibrillation at 200 J","D. Bicarb first -- calcium is not indicated"],ans:1,exp:"After calcium chloride (membrane stabilization), give albuterol continuously to shift K+ intracellularly, then sodium bicarbonate (DMO required) to further lower potassium."},
    {id:30,cat:"Medical",type:"mc",q:"Per Linn County TOR criteria, all of the following must be present EXCEPT:",opts:["A. High-quality CPR throughout","B. Vascular access achieved","C. Patient age over 65","D. No ROSC at any point"],ans:2,exp:"Age is NOT a TOR criterion. All required criteria relate to the quality and duration of resuscitation and clinical response -- not patient demographics."},
    {id:31,cat:"Pharmacology",type:"mc",q:"Fentanyl peak effect occurs at what time after IV administration?",opts:["A. 2 minutes","B. 5 minutes","C. 10 minutes","D. 20 minutes"],ans:2,exp:"Fentanyl peak effect at 10 minutes after IV. Rapid repeat dosing causes stacking and respiratory depression. Wait for peak effect before redosing."},
    {id:32,cat:"MAI",type:"mc",q:"ETCO2 waveform disappears suddenly during transport after confirmed intubation. First action:",opts:["A. Increase ventilation rate","B. Reassess ETT position immediately","C. Administer epinephrine","D. Contact DMO before acting"],ans:1,exp:"Sudden ETCO2 loss: immediately reassess ETT position. The tube may have dislodged with patient movement. If out -- BVM and re-intubate."},
    {id:33,cat:"Pharmacology",type:"mc",q:"Hydroxocobalamin is indicated for which Linn County patient?",opts:["A. Any burn patient","B. Enclosed-space fire patient with AMS, respiratory distress, or shock","C. Any CO exposure patient","D. Metformin toxicity"],ans:1,exp:"Hydroxocobalamin (5 g adult IV over 15 min) for enclosed-space fire patients with AMS, respiratory distress, shock, or seizures -- suspected cyanide toxicity."},
    {id:34,cat:"Cardiac",type:"mc",q:"Post-ROSC STEMI identified on 12-lead. Patient is comatose. Transport decision:",opts:["A. Nearest ED","B. STEMI center regardless of neurological status","C. Neuro ICU first","D. Transport only if GCS improves"],ans:1,exp:"STEMI post-ROSC: transport to STEMI center regardless of neurological status. Neurological prognosis cannot be determined early -- treat the cardiac cause."},
    {id:35,cat:"Medical",type:"mc",q:"Atropine for organophosphate exposure should be titrated to:",opts:["A. Heart rate > 80 bpm","B. Blood pressure > 90 mmHg","C. Drying of secretions -- not heart rate","D. Pupil dilation"],ans:2,exp:"Atropine for OP/nerve agent toxicity is titrated to drying of secretions, NOT heart rate. Tachycardia is expected with atropine and is not the target. No maximum dose."},
    {id:36,cat:"Medical",type:"mc",q:"Earliest sign of magnesium toxicity before respiratory arrest:",opts:["A. Hypertension","B. Loss of deep tendon reflexes (patellar reflex)","C. Tachycardia","D. Hyperreflexia"],ans:1,exp:"Loss of deep tendon reflexes (patellar reflex) is the earliest sign of magnesium toxicity. Check DTRs during any magnesium infusion. Antidote: calcium chloride 1 g IV."},
    {id:37,cat:"Pharmacology",type:"mc",q:"Sodium bicarbonate generates CO2 when given IV. What must be monitored?",opts:["A. SpO2 only","B. ETCO2 -- increase ventilation to clear CO2","C. Blood pressure only","D. Heart rate"],ans:1,exp:"Monitor ETCO2 and increase ventilation. Failure to clear CO2 worsens intracellular acidosis paradoxically even as serum pH rises."},
    {id:38,cat:"MAI",type:"mc",q:"Optimal intubating position in Linn County MAI:",opts:["A. Chin tucked, neck flexed","B. Ear aligned with sternal notch","C. Neck hyperextended","D. Flat supine without pillow"],ans:1,exp:"Ear-to-sternal-notch alignment optimizes laryngoscopy. For obese patients, ramp with blankets/pillows until the ear is level with the sternal notch."},
    {id:39,cat:"Pharmacology",type:"mc",q:"Preferred analgesic combination for fracture pain in hemodynamically STABLE Linn County patient:",opts:["A. Ketamine 1.5 mg/kg IV","B. Morphine 4 mg IV alone","C. Fentanyl + ketorolac (opioid-sparing approach)","D. Hydromorphone 2 mg IV alone"],ans:2,exp:"Opioid-sparing: fentanyl + ketorolac 15-30 mg IV for musculoskeletal/fracture pain in stable patients. Reduces total opioid dose. Ketorolac is single-dose only prehospital."},
    {id:40,cat:"Pharmacology",type:"mc",q:"Pediatric ketorolac dose (>= 2 years) in Linn County:",opts:["A. 30 mg IV -- same as adult","B. 15 mg IV flat dose","C. 0.5 mg/kg IV/IO or IM (max 15 mg)","D. 1 mg/kg IV (max 30 mg)"],ans:2,exp:"Pediatric ketorolac >= 2 yr: 0.5 mg/kg IV/IO or IM, max single dose 15 mg. Under 2: contact DMO. Single prehospital dose only."},
    {id:41,cat:"Pharmacology",type:"mc",q:"Adult IV acetaminophen dose in Linn County:",opts:["A. 500 mg IV over 5 minutes","B. 1,000 mg IV infused over 15 minutes","C. 650 mg IV push","D. 2,000 mg IV over 30 minutes"],ans:1,exp:"Adult IV acetaminophen: 1,000 mg infused over 15 minutes. Not an IV push. Contraindicated in chronic liver disease. AEMT and PM for IV route."},
    {id:42,cat:"MAI",type:"mc",q:"How long to wait after ketamine before giving the paralytic?",opts:["A. 15 seconds","B. 30 seconds","C. 60 seconds","D. 90 seconds"],ans:2,exp:"Wait 60 seconds after ketamine before paralytic. Signs at 60 sec: nystagmus, jaw relaxation, eyes deviate. Too early risks awareness during intubation."},
    {id:43,cat:"Pharmacology",type:"mc",q:"Hydromorphone (Dilaudid) is how many times more potent than morphine by weight?",opts:["A. 2-3x","B. 5-10x","C. Equal potency","D. 15-20x"],ans:1,exp:"Hydromorphone is approximately 5-10x more potent than morphine by weight. Adult dose: 0.5-2 mg IV/IO titrated, max 4 mg total."},
    {id:44,cat:"Medical",type:"mc",q:"A burn patient in Linn County is NOT in shock. Should IV fluids be given?",opts:["A. Yes -- Parkland formula","B. Yes -- 500 mL NS bolus","C. No -- do not give IV fluids if not in shock","D. Only if transport exceeds 30 min"],ans:2,exp:"Do NOT administer IV fluids to burn patients not in shock. Short transport times and inability to accurately calculate TBSA in the field offer no benefit and risk over-hydration."},
    {id:45,cat:"Medical",type:"mc",q:"Minimum SBP target for adult TBI patients in Linn County:",opts:["A. >= 80 mmHg","B. >= 90 mmHg","C. >= 110 mmHg","D. >= 120 mmHg"],ans:2,exp:"Adult TBI minimum SBP: >= 110 mmHg. Hypotension causes secondary brain injury. Treat aggressively with NS boluses."},
    {id:46,cat:"Pharmacology",type:"mc",q:"In which patient should an EKG be obtained before ondansetron administration?",opts:["A. All patients over age 50","B. Patients with electrolyte abnormalities, CHF, bradyarrhythmias, or QT-prolonging medications","C. All pediatric patients","D. Only post-ROSC patients"],ans:1,exp:"Obtain EKG before ondansetron in patients with electrolyte abnormalities, CHF, bradyarrhythmias, or QT-prolonging medications. Avoid in congenital long QT syndrome."},
    {id:47,cat:"Cardiac",type:"mc",q:"Criteria for withholding resuscitation in blunt traumatic arrest in Linn County:",opts:["A. Apneic + pulseless + asystole or PEA with HR < 40","B. Any pulseless patient after blunt trauma","C. GCS of 3 + apnea","D. TOR after 20 minutes CPR"],ans:0,exp:"Blunt traumatic arrest withholding: apneic + pulseless + asystole or PEA with HR < 40. All three must be present."},
    {id:48,cat:"MAI",type:"tf",q:"True or False: If unable to intubate after 2 attempts, place a King LT and contact DMO.",opts:["True","False"],ans:0,exp:"True. Failed airway rescue: BVM, place King LT SGA, contact DMO. If unable to oxygenate via BVM or SGA: surgical cricothyrotomy. The paralyzed patient has no backup."},
    {id:49,cat:"Pharmacology",type:"mc",q:"Maximum total fentanyl dose for adult pain management in Linn County:",opts:["A. 100 mcg","B. 150 mcg","C. 200 mcg","D. No maximum"],ans:2,exp:"Maximum total fentanyl: 200 mcg adult, 200 mcg pediatric. Initial adult: 25-100 mcg, repeat every 5-10 min to max."},
    {id:50,cat:"Medical",type:"mc",q:"Suspected ectopic pregnancy with hypotension in Linn County -- priority action:",opts:["A. IV fluids and pain management only","B. Rapid IV access, fluid resuscitation, expeditious transport","C. Contact OB-GYN before transport","D. Trendelenburg position and oxygen"],ans:1,exp:"Ectopic with hemodynamic instability is a surgical emergency. Priority: IV access, NS fluid resuscitation, expeditious transport. Do NOT delay for any intervention that can be done en route."}
  ]
};

// QUIZ STATE
var QS = { level: null, questions: [], current: 0, score: 0, history: [], missedIds: [], view: 'home' };

function shuffleQ(arr) {
  var a = arr.slice(), i, j, t;
  for (i = a.length - 1; i > 0; i--) {
    j = Math.floor(Math.random() * (i + 1));
    t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function startQuiz(lvl, missedOnly) {
  QS.level = lvl;
  QS.current = 0;
  QS.score = 0;
  QS.history = [];
  if (missedOnly && QS.missedIds.length) {
    var pool = QUIZ_DATA[lvl].filter(function(q) { return QS.missedIds.indexOf(q.id) >= 0; });
    QS.questions = shuffleQ(pool);
  } else {
    QS.questions = shuffleQ(QUIZ_DATA[lvl]);
  }
  QS.view = 'active';
  renderQuiz();
}

function renderQuiz() {
  var content = document.getElementById('content');
  if (QS.view === 'home') {
    content.innerHTML = buildQuizHome();
    document.getElementById('btn-start-emt').addEventListener('click', function() { startQuiz('emt', false); });
    document.getElementById('btn-start-aemt').addEventListener('click', function() { startQuiz('aemt', false); });
    document.getElementById('btn-start-pm').addEventListener('click', function() { startQuiz('pm', false); });
    var re = document.getElementById('btn-retry-emt');
    var ra = document.getElementById('btn-retry-aemt');
    var rp = document.getElementById('btn-retry-pm');
    if (re) re.addEventListener('click', function() { startQuiz('emt', true); });
    if (ra) ra.addEventListener('click', function() { startQuiz('aemt', true); });
    if (rp) rp.addEventListener('click', function() { startQuiz('pm', true); });
    return;
  }
  if (QS.view === 'active') { renderQuizQuestion(); return; }
  if (QS.view === 'results') { renderQuizResults(); return; }
}

function buildQuizHome() {
  var me = QS.level === 'emt'  && QS.missedIds.length ? '<button class="level-start-btn" id="btn-retry-emt"  style="margin-top:8px;background:var(--bark);border:1px solid var(--sage);color:var(--sage)">Retry Missed (' + QS.missedIds.length + ')</button>' : '';
  var ma = QS.level === 'aemt' && QS.missedIds.length ? '<button class="level-start-btn" id="btn-retry-aemt" style="margin-top:8px;background:var(--bark);border:1px solid var(--sky);color:var(--sky)">Retry Missed (' + QS.missedIds.length + ')</button>' : '';
  var mp = QS.level === 'pm'   && QS.missedIds.length ? '<button class="level-start-btn" id="btn-retry-pm"   style="margin-top:8px;background:var(--bark);border:1px solid var(--rust);color:#D4806A">Retry Missed (' + QS.missedIds.length + ')</button>' : '';
  return '<div class="quiz-home">' +
    '<div class="quiz-intro">Select your credential level. ' + QUIZ_DATA.emt.length + ' EMT, ' + QUIZ_DATA.aemt.length + ' AEMT, ' + QUIZ_DATA.pm.length + ' Paramedic questions. Multiple choice and true/false with instant feedback. Covers scope, medications, protocols, MAI, and clinical decision-making from the 2025/2026 Linn County Medical Protocols under Dr. Deshmukh.</div>' +
    '<div class="level-card emt"><div class="level-card-inner"><div class="level-icon"></div><div class="level-label">EMT Level</div><div class="level-title">EMT Protocol Quiz</div><div class="level-desc">Scope, airway, hemorrhage control, cardiac emergencies, EMT-authorized medications, pediatrics, stroke, trauma, and transport standards.</div><div class="level-tags"><span class="level-tag">' + QUIZ_DATA.emt.length + ' Questions</span><span class="level-tag">MC & True/False</span><span class="level-tag">Instant Feedback</span></div><button class="level-start-btn" id="btn-start-emt">Start EMT Quiz</button>' + me + '</div></div>' +
    '<div class="level-card aemt"><div class="level-card-inner"><div class="level-icon"></div><div class="level-label">AEMT Level</div><div class="level-title">AEMT Protocol Quiz</div><div class="level-desc">Advanced vascular access, AEMT-scope medications, cardiac emergencies, IO techniques, D10W, ondansetron, midazolam for seizures, and AEMT decision-making.</div><div class="level-tags"><span class="level-tag">' + QUIZ_DATA.aemt.length + ' Questions</span><span class="level-tag">MC & True/False</span><span class="level-tag">Instant Feedback</span></div><button class="level-start-btn" id="btn-start-aemt">Start AEMT Quiz</button>' + ma + '</div></div>' +
    '<div class="level-card pm"><div class="level-card-inner"><div class="level-icon"></div><div class="level-label">Paramedic Level</div><div class="level-title">Paramedic Protocol Quiz</div><div class="level-desc">Advanced pharmacology, MAI procedure, ventilation, vasopressors, ketorolac, IV acetaminophen, pediatric emergencies, and Paramedic-scope decision-making.</div><div class="level-tags"><span class="level-tag">' + QUIZ_DATA.pm.length + ' Questions</span><span class="level-tag">MC & True/False</span><span class="level-tag">Instant Feedback</span></div><button class="level-start-btn" id="btn-start-pm">Start Paramedic Quiz</button>' + mp + '</div></div>' +
  '</div>';
}

function renderQuizQuestion() {
  var q = QS.questions[QS.current];
  var total = QS.questions.length;
  var pct = Math.round((QS.current / total) * 100);
  var lvlLabel = {emt:'EMT LEVEL',aemt:'AEMT LEVEL',pm:'PARAMEDIC LEVEL'}[QS.level];
  var lvlColor = {emt:'var(--sage)',aemt:'var(--sky)',pm:'var(--rust)'}[QS.level];
  var optsHtml = '<div class="q-opts" id="q-opts">';
  for (var i = 0; i < q.opts.length; i++) {
    optsHtml += '<button class="q-opt" id="qopt-' + i + '">' + q.opts[i] + '</button>';
  }
  optsHtml += '</div>';
  var html =
    '<div class="quiz-active-hdr">' +
      '<div class="quiz-active-top">' +
        '<button class="quiz-quit-btn" id="quiz-quit-btn">x Quit</button>' +
        '<div class="quiz-level-tag" style="color:' + lvlColor + '">' + lvlLabel + '</div>' +
        '<div class="quiz-score-tag" id="quiz-score-live">' + QS.score + '/' + QS.current + '</div>' +
      '</div>' +
      '<div style="font-family:Courier Prime,monospace;font-size:11px;color:var(--clay);margin-bottom:6px">Question ' + (QS.current+1) + ' of ' + total + '</div>' +
      '<div class="quiz-prog"><div class="quiz-prog-fill" style="width:' + pct + '%"></div></div>' +
    '</div>' +
    '<div class="q-wrap-lc">' +
      '<div class="q-cat-lc">' + q.cat + '</div>' +
      '<span class="q-type-badge">' + (q.type === 'tf' ? 'TRUE / FALSE' : 'MULTIPLE CHOICE') + '</span>' +
      '<div class="q-text-lc">' + q.q + '</div>' +
      optsHtml +
      '<div id="q-feedback-area"></div>' +
    '</div>';
  document.getElementById('content').innerHTML = html;
  document.getElementById('quiz-quit-btn').addEventListener('click', function() {
    if (confirm('Quit quiz? Progress will be lost.')) { QS.view = 'home'; renderQuiz(); }
  });
  for (var j = 0; j < q.opts.length; j++) {
    (function(idx) {
      var btn = document.getElementById('qopt-' + idx);
      if (btn) btn.addEventListener('click', function() { handleQuizAnswer(idx); });
    })(j);
  }
}

function handleQuizAnswer(selectedIdx) {
  var q = QS.questions[QS.current];
  var correct = selectedIdx === q.ans;
  if (correct) QS.score++;
  QS.history.push({id:q.id,correct:correct,cat:q.cat,q:q.q,correctOpt:q.opts[q.ans],exp:q.exp});
  var scoreEl = document.getElementById('quiz-score-live');
  if (scoreEl) scoreEl.textContent = QS.score + '/' + (QS.current + 1);
  for (var i = 0; i < q.opts.length; i++) {
    var btn = document.getElementById('qopt-' + i);
    if (!btn) continue;
    btn.style.cursor = 'default';
    btn.style.pointerEvents = 'none';
    if (i === q.ans) btn.classList.add('correct');
    else if (i === selectedIdx && !correct) btn.classList.add('wrong');
  }
  var isLast = QS.current >= QS.questions.length - 1;
  var fbClass = correct ? 'correct' : 'wrong';
  var fbHdr = correct ? 'Correct!' : 'Incorrect';
  var fbArea = document.getElementById('q-feedback-area');
  fbArea.innerHTML =
    '<div class="q-feedback ' + fbClass + '"><div class="q-fb-hdr">' + (correct ? 'Correct' : 'Incorrect') + '</div><div class="q-fb-exp">' + q.exp + '</div></div>' +
    '<button class="q-next-btn" id="q-next-btn">' + (isLast ? 'See Results' : 'Next Question') + '</button>';
  document.getElementById('q-next-btn').addEventListener('click', function() {
    QS.current++;
    if (QS.current >= QS.questions.length) { QS.view = 'results'; renderQuizResults(); }
    else { renderQuizQuestion(); window.scrollTo(0,0); }
  });
  setTimeout(function() {
    var fb = document.getElementById('q-feedback-area');
    if (fb) fb.scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 100);
}

function renderQuizResults() {
  var total = QS.questions.length;
  var pct = Math.round((QS.score / total) * 100);
  var grade = pct >= 90 ? 'Excellent' : pct >= 80 ? 'Good — review missed items' : pct >= 70 ? 'Borderline — additional review recommended' : 'Needs improvement — protocol review required';
  var lvlLabel = {emt:'EMT',aemt:'AEMT',pm:'PARAMEDIC'}[QS.level];
  var cats = {};
  QS.history.forEach(function(h) {
    if (!cats[h.cat]) cats[h.cat] = {t:0,c:0};
    cats[h.cat].t++;
    if (h.correct) cats[h.cat].c++;
  });
  var catHtml = '';
  Object.keys(cats).sort().forEach(function(cat) {
    var d = cats[cat];
    var p = Math.round((d.c/d.t)*100);
    var color = p >= 80 ? 'var(--sage)' : p >= 60 ? 'var(--gold)' : 'var(--rust)';
    catHtml += '<div class="qr-cat-row"><div class="qr-cat-name">' + cat + '</div><div class="qr-cat-sc">' + d.c + '/' + d.t + '</div><div class="qr-bar-wrap"><div class="qr-bar" style="width:' + p + '%;background:' + color + '"></div></div></div>';
  });
  var missed = QS.history.filter(function(h) { return !h.correct; });
  QS.missedIds = missed.map(function(h) { return h.id; });
  var missedHtml = missed.length === 0
    ? '<div style="text-align:center;padding:20px;color:var(--sage);font-family:Playfair Display,serif;font-size:16px">Perfect score!</div>'
    : '<div class="qr-sec-label">MISSED QUESTIONS (' + missed.length + ')</div>' + missed.map(function(ms) {
        return '<div class="qr-missed-item"><div class="qr-missed-q">' + ms.q + '</div><div class="qr-missed-ans">Correct: ' + ms.correctOpt + '</div><div class="qr-missed-exp">' + ms.exp + '</div></div>';
      }).join('');
  var html =
    '<div class="quiz-results-hdr"><div class="qr-level">' + lvlLabel + ' LEVEL</div><div class="qr-title">Quiz Complete</div><div class="qr-score">' + QS.score + '<span class="qr-denom">/' + total + '</span></div><div class="qr-pct">' + pct + '%</div><div class="qr-grade">' + grade + '</div></div>' +
    '<div class="quiz-results-body">' +
      '<div class="qr-breakdown"><div class="qr-bdi"><div class="qr-bdi-num c">' + QS.score + '</div><div class="qr-bdi-label">Correct</div></div><div class="qr-bdi"><div class="qr-bdi-num w">' + (total-QS.score) + '</div><div class="qr-bdi-label">Incorrect</div></div></div>' +
      '<div style="margin-bottom:20px"><div class="qr-sec-label">BY CATEGORY</div>' + catHtml + '</div>' +
      '<div style="margin-bottom:20px">' + missedHtml + '</div>' +
      '<div class="qr-actions">' +
        '<button class="qr-btn primary" id="qr-retry">Retry Full Quiz</button>' +
        (missed.length ? '<button class="qr-btn ghost" id="qr-retry-missed">Retry Missed (' + missed.length + ')</button>' : '') +
        '<button class="qr-btn secondary" id="qr-home">Choose Level</button>' +
      '</div>' +
    '</div>';
  document.getElementById('content').innerHTML = html;
  document.getElementById('qr-retry').addEventListener('click', function() { startQuiz(QS.level, false); });
  document.getElementById('qr-home').addEventListener('click', function() { QS.view = 'home'; renderQuiz(); });
  var rm = document.getElementById('qr-retry-missed');
  if (rm) rm.addEventListener('click', function() { startQuiz(QS.level, true); });
}


</script>

</body>
</html>
